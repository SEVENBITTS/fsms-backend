        renderState.lastEventRenderKey = "";
        renderState.lastScrollEventId = null;

        lastStableAdvisory = {
          level: "INFO",
          text: "NO ACTION REQUIRED",
          cls: "risk-ok",
          actionChoice: null,
          priorityScore: 0
        };

        pendingAdvisory = null;
        pendingAdvisoryTs = 0;
        lastStableAdvisoryTs = 0;

        lastEventState = {
          riskLabel: null,
          advisoryKey: null,
          boundaryActive: false,
          conflict4DActive: false,
          envelopeActive: false,
          ttbBands: {
            le20: false,
            le10: false,
            le5: false,
            le2: false
          }
        };
      }

      // =========================
      // DATA LOAD
      // =========================
      async function fetchJson(url, errorLabel, { timeoutMs = FETCH_TIMEOUT_MS, retries = FETCH_RETRIES } = {}) {
        let lastError = null;

        for (let attempt = 0; attempt <= retries; attempt++) {
          const controller = new AbortController();
          const timeout = setTimeout(() => controller.abort(), timeoutMs);

          try {
            if (DEBUG) console.log(`[FETCH] ${url} (attempt ${attempt + 1})`);

            const res = await fetch(url, {
              signal: controller.signal,
              headers: { "Accept": "application/json" }
            });

            clearTimeout(timeout);

            if (!res.ok) {
              throw new Error(`${errorLabel} (${res.status})`);
            }

            return await res.json();
          } catch (err) {
            clearTimeout(timeout);
            lastError = err;

            if (DEBUG) console.warn(`[FETCH FAIL] ${url}`, err);

            if (attempt === retries) break;

            await new Promise((r) => setTimeout(r, 300 * (attempt + 1)));
          }
        }

        throw lastError || new Error(errorLabel);
      }

      let replayData;
      try {
        replayData = await fetchJson(API_URL, "Replay fetch failed");
      } catch (err) {
        alert(`Replay failed: ${err.message}`);
        return;
      }

      const replayItems = toArray(replayData?.replay);
      if (!replayItems.length) {
        alert("No replay data");
        return;
      }

      const pts = replayItems
        .map((p) => {
          const t = safeDateMs(p?.timestamp);
          const lat = toNullableNumber(p?.lat);
          const lng = toNullableNumber(p?.lon);
          const alt = toNumber(p?.altitude_m, 0);

          if (t === null || lat === null || lng === null) return null;
          return { lat, lng, alt, t };
        })
        .filter(Boolean);

      if (!pts.length) {
        alert("Replay data is present but invalid");
        return;
      }

      const t0 = pts[0].t;
      const duration = Math.max(0, pts[pts.length - 1].t - t0);

      flightBounds = new maplibregl.LngLatBounds();
      pts.forEach((p) => flightBounds.extend([p.lng, p.lat]));

      let pointStatus = [];
      try {
        const complianceJson = await fetchJson(COMPLIANCE_URL, "Compliance fetch failed");
        pointStatus = toArray(complianceJson?.items);
      } catch (err) {
        console.warn("Compliance fetch error:", err.message);
      }

      function getComplianceForReplayTime(ts, fallbackIndex = 0) {
        if (!pointStatus.length) return null;

        const safeFallback = pointStatus[Math.min(fallbackIndex, pointStatus.length - 1)] || null;
        const targetMs = safeDateMs(ts);
        if (targetMs === null) return safeFallback;

        let exact = null;
        let best = null;
        let bestDiff = Infinity;

        for (const item of pointStatus) {
          const itemTs = safeDateMs(item?.ts || item?.timestamp || item?.time);
          if (itemTs === null) continue;

          if (itemTs === targetMs) {
            exact = item;
            break;
          }

          const diff = Math.abs(itemTs - targetMs);
          if (diff < bestDiff) {
            best = item;
            bestDiff = diff;
          }
        }

        return exact || best || safeFallback;
      }

      function interpolate(time) {
        if (!pts.length) {
          return { lng: 0, lat: 0, alt: 0, t: time, source_t: time };
        }

        const clampedTime = clamp(time, pts[0].t, pts[pts.length - 1].t);

        while (currentIndex < pts.length - 2 && pts[currentIndex + 1].t <= clampedTime) {
          currentIndex++;
        }

        while (currentIndex > 0 && pts[currentIndex].t > clampedTime) {
          currentIndex--;
        }

        const a = pts[currentIndex] || pts[0];
        const b = pts[currentIndex + 1] || a;
        const span = b.t - a.t;
        const f = span === 0 ? 0 : clamp((clampedTime - a.t) / span, 0, 1);

        return {
          lng: a.lng + (b.lng - a.lng) * f,
          lat: a.lat + (b.lat - a.lat) * f,
          alt: a.alt + (b.alt - a.alt) * f,
          t: clampedTime,
          source_t: a.t
        };
      }

      // =========================
      // MAP INIT
      // =========================
      const map = new maplibregl.Map({
        container: "map",
        style: `https://api.maptiler.com/maps/streets-v2/style.json?key=${MAP_KEY}`,
        center: [pts[0].lng, pts[0].lat],
        zoom: 14,
        pitch: 50
      });

      map.addControl(new maplibregl.NavigationControl());

      const aircraftEl = document.createElement("div");
      aircraftEl.className = "aircraft-dot";
      const aircraft = new maplibregl.Marker({ element: aircraftEl })
        .setLngLat([pts[0].lng, pts[0].lat])
        .addTo(map);

      const ghostEl = document.createElement("div");
      ghostEl.className = "ghost-dot";
      const ghost = new maplibregl.Marker({ element: ghostEl })
        .setLngLat([pts[0].lng, pts[0].lat])
        .addTo(map);

      const breachEl = document.createElement("div");
      breachEl.className = "breach-dot";
      breachEl.style.display = "none";
      const breachMarker = new maplibregl.Marker({ element: breachEl })
        .setLngLat([pts[0].lng, pts[0].lat])
        .addTo(map);

      const entryEl = document.createElement("div");
      entryEl.className = "entry-dot";
      entryEl.style.display = "none";
      const entryMarker = new maplibregl.Marker({ element: entryEl })
        .setLngLat([pts[0].lng, pts[0].lat])
        .addTo(map);

      const vectorLabelEl = document.createElement("div");
      Object.assign(vectorLabelEl.style, {
        background: "rgba(10,12,16,0.9)",
        color: "#e8eefc",
        padding: "4px 6px",
        borderRadius: "6px",
        fontFamily: "ui-monospace, Menlo, Consolas, monospace",
        fontSize: "11px",
        fontWeight: "700",
        border: "1px solid rgba(255,255,255,0.12)",
        boxShadow: "0 4px 10px rgba(0,0,0,0.25)",
        display: "none",
        whiteSpace: "nowrap"
      });

      const vectorLabel = new maplibregl.Marker({
        element: vectorLabelEl,
        offset: [20, -25]
      }).setLngLat([pts[0].lng, pts[0].lat]).addTo(map);

      map.on("load", async () => {
        mapReady = true;
        mapStyleReady = true;

        setupFeatureToggles();
        ensureTrendLayer(map);
        ensureVectorLayers(map);
        ensurePredictiveEnvelopeLayers(map);

        try {
          airspaceGeojson = await fetchJson(AIRSPACE_URL, "Airspace fetch failed");
          if (!Array.isArray(airspaceGeojson?.features)) {
            airspaceGeojson = { type: "FeatureCollection", features: [] };
          }

          airspaceLoaded = true;
          ensureAirspaceLayers(map);

          airspaceBounds = computeGeojsonBounds(airspaceGeojson);
          if (airspaceBounds) {
            zoomAirspaceBtn.disabled = false;
            zoomBothBtn.disabled = false;
          }

          document.querySelectorAll(".zone-filter").forEach((cb) => {
            cb.addEventListener("change", () => updateZoneFilter(map));
          });

          updateZoneFilter(map);
        } catch (err) {
          console.warn("Airspace not loaded:", err.message);
          airspaceGeojson = { type: "FeatureCollection", features: [] };
          airspaceLoaded = false;
        }

        map.addSource("flight-path", {
          type: "geojson",
          data: {
            type: "Feature",
            geometry: {
              type: "LineString",
              coordinates: pts.map((p) => [p.lng, p.lat])
            }
          }
        });

        map.addLayer({
          id: "flight-line",
          type: "line",
          source: "flight-path",
          layout: { "line-cap": "round", "line-join": "round" },
          paint: {
            "line-color": "#ff0000",
            "line-opacity": 0.95,
            "line-width": ["interpolate", ["linear"], ["zoom"], 10, 2, 12, 4, 14, 6, 16, 10, 18, 14]
          }
        });

        zoomTo(map, flightBounds);
        requestAnimationFrame(loop);
      });

      map.on("styledata", () => {
        const ready = map.isStyleLoaded?.() ?? false;
        mapStyleReady = ready;
        if (!ready) return;

        try {
          rehydrateMapOverlays(map);
          debugLog("Map overlays rehydrated after styledata");
        } catch (err) {
          debugWarn("Failed to rehydrate overlays after style change", err);
        }
      });

      // =========================
      // LOOP
      // =========================
      function loop(now) {
        if (lastFrame === null) lastFrame = now;
        const dt = now - lastFrame;
        lastFrame = now;

        if (playing) {
          simElapsed += dt * speed;
          if (simElapsed > duration) {
            simElapsed = duration;
            playing = false;
            playBtn.textContent = "Play";
          }
        }

        const simTimeMs = simElapsed;
        startupMuted = simTimeMs < STARTUP_MUTED_UNTIL_MS;
        const t = t0 + simElapsed;
        const replayTime = pts?.[currentIndex]?.t ?? t;

        let pos = interpolate(t);

        if (!map || !mapReady) {
          requestAnimationFrame(loop);
          return;
        }

        const styleReady = map.isStyleLoaded?.() ?? true;
        if (!styleReady) {
          requestAnimationFrame(loop);
          return;
        }

        if (FEATURES.kalman) {
          pos = kalmanLike(lastSmoothedPos || pos, pos);
          lastSmoothedPos = pos;
        } else {
          lastSmoothedPos = null;
        }

        aircraft.setLngLat([pos.lng, pos.lat]);

        if (playing) {
          map.easeTo({ center: [pos.lng, pos.lat], duration: 250, easing: (x) => x });
        }

        const progress = duration > 0 ? (simElapsed / duration) * 100 : 0;

        const curr = pts[currentIndex] || pts[0];
        const next = pts[Math.min(pts.length - 1, currentIndex + 1)] || curr;
        const dtTrack = Math.max(0.001, (next.t - curr.t) / 1000);

        const groundspeed = distanceM(
          { lng: curr.lng, lat: curr.lat },
          { lng: next.lng, lat: next.lat }
        ) / dtTrack;

        const brg = bearingDeg(
          { lng: curr.lng, lat: curr.lat },
          { lng: next.lng, lat: next.lat }
        );

        const vz = ((next.alt ?? 0) - (curr.alt ?? 0)) / dtTrack;

        const tFutureTrend = Math.min(t0 + duration, t + TREND_SECONDS * 1000);
        const posFuture = interpolate(tFutureTrend);

        ghostEl.style.display = (playing && FEATURES.trend) ? "block" : "none";
        safeSetLayerVisibility(map, "trend-line", playing && FEATURES.trend);

        if (FEATURES.trend) {
          ghost.setLngLat([posFuture.lng, posFuture.lat]);
          safeSetGeojsonData(map, "trend", {
            type: "Feature",
            geometry: {
              type: "LineString",
              coordinates: [[pos.lng, pos.lat], [posFuture.lng, posFuture.lat]]
            }
          });
        }

        const vectorVisible = FEATURES.vectors && Number.isFinite(brg);
        safeSetLayerVisibility(map, "heading-vector-line", vectorVisible);
        safeSetLayerVisibility(map, "flight-vector-arrow-fill", vectorVisible);

        if (vectorVisible) {
          const headingEnd = movePoint({ lat: pos.lat, lng: pos.lng }, brg, 50);
          const projectedEnd = movePoint(
            { lat: pos.lat, lng: pos.lng },
            brg,
            groundspeed > 0 ? Math.max(70, Math.min(180, groundspeed * 4)) : 90
          );

          safeSetGeojsonData(map, "heading-vector", {
            type: "Feature",
            geometry: {
              type: "LineString",
              coordinates: [[pos.lng, pos.lat], [headingEnd.lng, headingEnd.lat]]
            }
          });

          safeSetGeojsonData(map, "flight-vector-arrow", {
            type: "FeatureCollection",
            features: [makeArrowHead(projectedEnd, brg, 18, 28)]
          });
        }

        if (FEATURES.vectors) {
          vectorLabelEl.style.display = "block";
          vectorLabel.setLngLat([pos.lng, pos.lat]);
          vectorLabelEl.innerHTML =
            `HDG ${Number.isFinite(brg) ? brg.toFixed(0) : "—"}° | ` +
            `GS ${isFiniteNumber(groundspeed) ? groundspeed.toFixed(1) : "—"} m/s | ` +
            `VS ${isFiniteNumber(vz) ? vz.toFixed(1) : "—"} m/s`;
        } else {
          vectorLabelEl.style.display = "none";
        }

        const c = getComplianceForReplayTime(replayTime, currentIndex);
        const zone = c?.zone || null;
        const zoneName = zone?.name || "None";
        const zoneType = zone?.zone_type || "-";
        const status = c?.eval_status || zone?.eval_status || "-";
        const upperM = zone?.upper_m ?? null;
        const lowerM = zone?.lower_m ?? null;

        const altAgl = c?.alt_agl_m ?? null;
        const altAmsl = c?.alt_amsl_m ?? pos.alt;
        const terrainAmsl =
          altAgl !== null && altAmsl !== null
            ? toNumber(altAmsl) - toNumber(altAgl)
            : null;

        let margin = null;
        let basis = "—";
        if (upperM !== null && upperM !== undefined) {
          if (toStringSafe(status).includes("_AGL") && altAgl !== null && altAgl !== undefined) {
            margin = toNumber(upperM) - toNumber(altAgl);
            basis = "AGL";
          } else {
            margin = toNumber(upperM) - toNumber(altAmsl);
            basis = "AMSL";
          }
        }

        const predictionAltNow = basis === "AGL" ? altAgl : altAmsl;
        const zoneSource =
          zone?.source ||
          zone?.source_name ||
          zone?.authority_name ||
          zone?.external_id ||
          "Unknown";

        const verticalRelation = describeVerticalRelation(predictionAltNow, lowerM, upperM);

        const predictSeconds =
          groundspeed > 0
            ? Math.min(MAX_PREDICT_SECONDS, MAX_PREDICT_DIST / groundspeed)
            : MAX_PREDICT_SECONDS;

        const predictedDistanceM =
          groundspeed > 0
            ? Math.min(MAX_PREDICT_DIST, groundspeed * predictSeconds)
            : 0;

        const hasAirspace = airspaceLoaded && toArray(airspaceGeojson?.features).length > 0;

        let futurePath = [];
        let predictiveEnvelope = null;
        let predictiveEnvelopeConflicts = [];
        let boundaryPrediction = null;
        let conflict4D = null;
        let verticalTtb = null;

        if (FEATURES.prediction && hasAirspace) {
          const shouldCalc = shouldRecalculatePrediction({
            nowMs: now,
            pos,
            brg,
            groundspeed
          });

          if (shouldCalc) {
            cachedPredictionResult = computePredictionBundle({
              pos,
              brg,
              groundspeed,
              vz,
              predictSeconds,
              predictionAltNow
            });

            lastPredictionCalcMs = now;
            lastPredictionInputs = {
              pos: { lat: pos.lat, lng: pos.lng },
              brg,
              groundspeed
            };
          }

          ({
            futurePath,
            predictiveEnvelope,
            predictiveEnvelopeConflicts,
            boundaryPrediction,
            conflict4D,
            verticalTtb
          } = cachedPredictionResult);
        } else {
          cachedPredictionResult = {
            futurePath: [],
            predictiveEnvelope: null,
            predictiveEnvelopeConflicts: [],
            boundaryPrediction: null,
            conflict4D: null,
            verticalTtb: null
          };

          lastPredictionInputs = null;
          lastPredictionCalcMs = -Infinity;
        }

        safeSetGeojsonData(
          map,
          "predictive-envelope",
          predictiveEnvelope || { type: "FeatureCollection", features: [] }
        );

        safeSetGeojsonData(map, "predictive-envelope-conflicts", {
          type: "FeatureCollection",
          features: predictiveEnvelopeConflicts.map((x) => x.overlap).filter(Boolean)
        });

        const ttb = predictTtb(margin, vz);

        const rawRiskScore = computeOperationalRisk({
          zoneType,
          margin,
          ttb,
          conflict4D,
          boundaryPrediction,
          verticalRelation,
          envelopeCount: predictiveEnvelopeConflicts.length,
          vz
        });

        smoothedRiskScore = smoothValue(smoothedRiskScore, rawRiskScore, 0.25);

        const displayRiskScore = Math.round(smoothedRiskScore);
        const displayRiskInfo = computeRiskLevel(displayRiskScore);
        const riskTrend = getRiskTrend(lastDisplayedRiskScore, displayRiskScore, 2);
        const riskDelta = displayRiskScore - lastDisplayedRiskScore;
        lastDisplayedRiskScore = displayRiskScore;

        const riskSummary = getRiskReasonSummary({
          margin,
          ttb,
          conflict4D,
          boundaryPrediction,
          envelopeCount: predictiveEnvelopeConflicts.length
        });

        lastRiskLabel = logRiskTransition({
          replayTime,
          previousRiskLabel: lastRiskLabel,
          currentRiskLabel: displayRiskInfo.label,
          riskScore: displayRiskScore,
          details: riskSummary
        });

        const hazardPos = conflict4D?.conflict ? conflict4D.pos : boundaryPrediction?.pos || null;
        const zoneBearing = hazardPos ? bearingDeg(pos, hazardPos) : null;
        const turnBias = computeTurnBias({ brg, zoneBearing });

        const advisory = computeAdvisory({
          margin,
          vz,
          ttb,
          conflict4D,
          boundaryPrediction,
          verticalRelation,
          zoneName,
          zoneType,
          groundspeed,
          turnBias
        });

        const stableAdvisory = stabilizeAdvisoryDisplay(
          advisory,
          replayTime || Date.now(),
          { holdMs: 1500, candidateDwellMs: 700 }
        );

        if (!startupMuted) {
          logFlightEvents({
            replayIso: new Date(t).toISOString(),
            simTimeMs: simElapsed,
            riskLabel: displayRiskInfo.label,
            riskScore: displayRiskScore,
            advisory: stableAdvisory,
            ttb,
            boundaryPrediction,
            conflict4D,
            envelopeConflictCount: predictiveEnvelopeConflicts.length,
            zoneName,
            zoneType,
            margin,
            verticalRelation
          });
        }

        renderEventLog(flightEventLog, simElapsed, duration);
        if (playing) {
          scrollCurrentEventIntoView();
        }

        aircraftEl.style.background =
          c?.breach_unknown ? "#ffbf00" :
          c?.breach ? "#ff0000" :
          c ? "#00ff00" : "#0057ff";

        const breachText =
          c?.breach ? "BREACH" :
          (conflict4D?.conflict || boundaryPrediction) ? "PREDICTED CONFLICT" :
          "CLEAR";

        const marginPct =
          margin == null || Number.isNaN(margin)
            ? 0
            : margin < 0 ? 100 : marginToPct(margin);

        let warnText = "";
        let warnClass = "";
        let warnShow = false;

        if (!startupMuted && FEATURES.prediction && margin !== null && !Number.isNaN(margin)) {
          if (margin < 0) {
            warnShow = true;
            warnClass = "risk-breach";
            warnText = "BREACH — IMMEDIATE ACTION";
          } else if (ttb !== null && ttb <= 30) {
            warnShow = true;
            warnClass = "risk-warning";
            warnText = `PREDICTED BREACH IN ${Math.round(ttb)}s`;
          } else if (conflict4D?.conflict) {
            warnShow = true;
            warnClass = "risk-warning";
            warnText = `4D CONFLICT IN ${Math.round(conflict4D.ttb_s)}s (${conflict4D.zoneName})`;
          } else if (conflict4D && conflict4D.vertical_known === false) {
            warnShow = true;
            warnClass = "risk-caution";
            warnText = `BOUNDARY ENTRY IN ${Math.round(conflict4D.ttb_s)}s — VERTICAL UNKNOWN (${conflict4D.zoneName})`;
          } else if (boundaryPrediction) {
            warnShow = true;
            warnClass = "risk-caution";
            warnText = `TRACK ENTRY IN ${Math.round(boundaryPrediction.ttb_s)}s (${boundaryPrediction.zoneName})`;
          } else if (margin <= 20) {
            warnShow = true;
            warnClass = "risk-warning";
            warnText = "WARNING — LOW MARGIN";
          } else if (margin <= 50) {
            warnShow = true;
            warnClass = "risk-caution";
            warnText = "CAUTION — MARGIN REDUCING";
          }
        }

        if (!startupMuted && stableAdvisory.level !== "INFO") {
          warnShow = true;
          warnClass = stableAdvisory.cls;
          warnText = stableAdvisory.text;
        }

        if (!startupMuted && FEATURES.prediction && ttb !== null && ttb > 0 && ttb <= 120) {
          const tBreach = Math.min(t0 + duration, t + ttb * 1000);
          const breachPos = interpolate(tBreach);

          if (isValidLngLat(breachPos)) {
            breachMarker.setLngLat([breachPos.lng, breachPos.lat]);
            breachEl.style.display = "block";
          } else {
            breachEl.style.display = "none";
          }
        } else {
          breachEl.style.display = "none";
        }

        if (!startupMuted && FEATURES.prediction && (conflict4D?.conflict || boundaryPrediction)) {
          const p = conflict4D?.conflict ? conflict4D.pos : boundaryPrediction?.pos;
          if (p && isValidLngLat(p)) {
            entryMarker.setLngLat([p.lng, p.lat]);
            entryEl.style.display = "block";

            if (conflict4D?.conflict) {
              entryEl.style.border = "3px solid #ff0000";
              entryEl.style.background = "rgba(255,0,0,0.18)";
            } else {
              entryEl.style.border = "3px solid #ffbf00";
              entryEl.style.background = "rgba(255,191,0,0.18)";
            }
          } else {
            entryEl.style.display = "none";
          }
        } else {
          entryEl.style.display = "none";
        }

        safeSetLayerVisibility(map, "airspace-3d", FEATURES.cone);

        const actionText = stableAdvisory?.actionChoice
          ? [stableAdvisory.actionChoice.primary, stableAdvisory.actionChoice.secondary].filter(Boolean).join(" / ")
          : "—";

        const advisoryConfidence = computeAdvisoryConfidence({
          conflict4D,
          boundaryPrediction,
          turnBias,
          ttb,
          verticalRelation,
          zoneType
        });

        const advisoryPriorityText =
          stableAdvisory?.priorityScore != null
            ? stableAdvisory.priorityScore.toFixed(1)
            : "—";

        const boundaryTtb = boundaryPrediction?.ttb_s ?? null;
        const conflictTtb = conflict4D?.conflict ? conflict4D.ttb_s : null;
        const verticalConflictTtb = verticalTtb?.ttb_s ?? null;
        const envelopeConflictCount = predictiveEnvelopeConflicts.length;
        const envelopeActive = !!predictiveEnvelope;

        const focusZone =
          (conflict4D && {
            name: conflict4D.zoneName || "Unknown",
            type: conflict4D.zoneType || "-",
            ttb: conflict4D.ttb_s ?? null,
            boundaryTtb: boundaryPrediction?.ttb_s ?? null,
            conflictTtb: conflict4D.ttb_s ?? null,
            active: true,
            source: "4D CONFLICT"
          }) ||
          (boundaryPrediction && {
            name: boundaryPrediction.zoneName || "Unknown",
            type: boundaryPrediction.zoneType || "-",
            ttb: boundaryPrediction.ttb_s ?? null,
            boundaryTtb: boundaryPrediction.ttb_s ?? null,
            conflictTtb: null,
            active: true,
            source: "BOUNDARY PREDICTION"
          }) || {
            name: zoneName,
            type: zoneType,
            ttb: null,
            boundaryTtb: null,
            conflictTtb: null,
            active: !!zone && zoneName !== "None",
            source: "COMPLIANCE"
          };

        const focusZoneFeature = toArray(airspaceGeojson?.features).find(
          (f) => f?.properties?.name === focusZone.name
        );

        const focusZoneLowerM = focusZoneFeature?.properties?.lower_m ?? lowerM;
        const focusZoneUpperM = focusZoneFeature?.properties?.upper_m ?? upperM;
        const focusZoneActiveText = focusZone.active ? "ACTIVE" : "INACTIVE";
        const focusZoneVertBlock = `${fmtLimit(focusZoneLowerM)} → ${fmtLimit(focusZoneUpperM)}`;

        const zoneTtbText = focusZone.ttb !== null ? `${toNumber(focusZone.ttb).toFixed(1)} s` : "—";
        const boundaryTtbText = boundaryTtb !== null ? `${toNumber(boundaryTtb).toFixed(1)} s` : "—";
        const conflictTtbText = conflictTtb !== null ? `${toNumber(conflictTtb).toFixed(1)} s` : "—";
        const verticalConflictTtbText = verticalConflictTtb !== null ? `${toNumber(verticalConflictTtb).toFixed(1)} s` : "—";
        const marginText = margin === null ? "—" : `${toNumber(margin).toFixed(1)} m`;
        const ttbText = ttb !== null ? `${toNumber(ttb).toFixed(1)} s` : "—";
        const vsText = isFiniteNumber(vz) ? `${vsArrow(vz)} ${toNumber(vz).toFixed(1)} m/s` : "—";
        const hdgText = Number.isFinite(brg) ? `${brg.toFixed(0)}°` : "—";
        const gsText = isFiniteNumber(groundspeed) ? `${groundspeed.toFixed(1)} m/s` : "—";

        hud.innerHTML = `
          <div class="hud-header">
            <div class="hud-title">MISSION CONTROL</div>
            <div class="hud-chip ${displayRiskInfo.cls}">${displayRiskInfo.label}</div>
          </div>

          <div class="hud-grid">
            <div class="hud-k">TIME</div><div class="hud-v">${new Date(t).toLocaleTimeString()}</div>
            <div class="hud-k">LAT</div><div class="hud-v">${pos.lat.toFixed(5)}</div>
            <div class="hud-k">LON</div><div class="hud-v">${pos.lng.toFixed(5)}</div>
            <div class="hud-k">ALT AMSL</div><div class="hud-v">${fmtM(altAmsl)}</div>
            <div class="hud-k">ALT AGL</div><div class="hud-v">${fmtM(altAgl)}</div>
            <div class="hud-k">TERRAIN</div><div class="hud-v">${fmtM(terrainAmsl)}</div>
            <div class="hud-k">V/S</div><div class="hud-v">${vsText}</div>
            <div class="hud-k">HDG</div><div class="hud-v">${hdgText}</div>
            <div class="hud-k">GS</div><div class="hud-v">${gsText}</div>
            <div class="hud-k">SPEED</div><div class="hud-v">${speed}×</div>
            <div class="hud-k">PROGRESS</div><div class="hud-v">${progress.toFixed(1)}%</div>
          </div>

          <div class="hud-divider"></div>

          <div class="hud-v hud-section-title">ZONE DETAILS</div>

          <div class="hud-grid">
            <div class="hud-k">ZONE NAME</div><div class="hud-v">${escapeHtml(focusZone.name)}</div>
            <div class="hud-k">ZONE TYPE</div><div class="hud-v">${escapeHtml(focusZone.type)}</div>
            <div class="hud-k">ZONE STATUS</div><div class="hud-v ${getZoneStatusClass(focusZone.source)}">${escapeHtml(focusZone.source)}</div>
            <div class="hud-k">ZONE ACTIVE</div><div class="hud-v ${getZoneActiveClass(focusZoneActiveText)}">${focusZoneActiveText}</div>
            <div class="hud-k">ZONE VERT BLOCK</div><div class="hud-v">${focusZoneVertBlock}</div>
            <div class="hud-k">ZONE SRC</div><div class="hud-v">${escapeHtml(zoneSource)}</div>
            <div class="hud-k">ZONE TTB</div><div class="hud-v">${zoneTtbText}</div>
            <div class="hud-k">BND TTB</div><div class="hud-v">${boundaryTtbText}</div>
            <div class="hud-k">4D TTB</div><div class="hud-v">${conflictTtbText}</div>
            <div class="hud-k">VERT TTB</div><div class="hud-v">${verticalConflictTtbText}</div>
            <div class="hud-k">ENVELOPE</div><div class="hud-v">${envelopeActive ? "ON" : "OFF"}</div>
            <div class="hud-k">ENV CONFLICTS</div><div class="hud-v">${envelopeConflictCount}</div>
          </div>

          <div class="hud-divider"></div>

          <div class="hud-v hud-section-title">UAV DETAILS</div>

          <div class="hud-grid">
            <div class="hud-k">UAV VERT LIMITS</div><div class="hud-v">${fmtLimit(lowerM)} → ${fmtLimit(upperM)}</div>
            <div class="hud-k">LIMIT BASIS</div><div class="hud-v">${basis}</div>
            <div class="hud-k">UAV STATUS</div><div class="hud-v">${escapeHtml(status)}</div>
            <div class="hud-k">CURRENT ALT</div><div class="hud-v">${fmtM(predictionAltNow)}</div>
            <div class="hud-k">VERT REL</div><div class="hud-v">${verticalRelation}</div>
            <div class="hud-k">MARGIN</div><div class="hud-v">${marginText}</div>
            <div class="hud-k">MARGIN %</div><div class="hud-v">${marginPct.toFixed(0)}%</div>
            <div class="hud-k">TTB</div><div class="hud-v">${ttbText}</div>
            <div class="hud-k">PRED HOR</div><div class="hud-v">${predictSeconds.toFixed(1)} s</div>
            <div class="hud-k">PRED DIST</div><div class="hud-v">${predictedDistanceM.toFixed(1)} m</div>
            <div class="hud-k">RESULT</div><div class="hud-v ${getResultClass(breachText)}">${breachText}</div>
          </div>

          <div class="hud-divider"></div>

          <div class="hud-grid">
            <div class="hud-k">RISK</div><div class="hud-v ${displayRiskInfo.cls}">${displayRiskInfo.label}</div>
            <div class="hud-k">SCORE</div><div class="hud-v">${displayRiskScore}%</div>
            <div class="hud-k">TREND</div><div class="hud-v">${riskTrend.arrow} ${riskTrend.label}</div>
            <div class="hud-k">ΔRISK</div><div class="hud-v">${riskDelta > 0 ? "+" : ""}${riskDelta}</div>
            <div class="hud-k">DRIVERS</div><div class="hud-v">${escapeHtml(riskSummary)}</div>
          </div>

          <div class="risk-bar-wrap" title="${escapeHtml(riskSummary)}">
            <div class="risk-bar-fill ${getRiskBarClass(displayRiskScore)}" style="width:${displayRiskScore}%"></div>
          </div>

          <div class="hud-divider"></div>

          <div class="hud-grid">
            <div class="hud-k">ADV PRI</div><div class="hud-v">${advisoryPriorityText}</div>
            <div class="hud-k">ADVISORY</div><div class="hud-v ${stableAdvisory.cls}">${stableAdvisory.level}</div>
            <div class="hud-k">INSTRUCTION</div><div class="hud-v ${stableAdvisory.cls}">${escapeHtml(stableAdvisory.text)}</div>
            <div class="hud-k">CONFIDENCE</div><div class="hud-v">${advisoryConfidence}</div>
            <div class="hud-k">MANEUVER</div><div class="hud-v">${escapeHtml(actionText)}</div>
          </div>
        `;

        if (warnRoot) {
          warnRoot.innerHTML = warnShow
            ? `<div class="warnstrip show ${warnClass}">${escapeHtml(warnText)}</div>`
            : "";
        }

        window._fsmsDebug = {
          simElapsed,
          t,
          playing,
          currentIndex,
          risk: displayRiskInfo?.label ?? null,
          advisory: stableAdvisory?.text ?? null,
          airspaceLoaded,
          hasAirspace
        };

        if (slider) {
          slider.value = duration > 0 ? String(simElapsed / duration) : "0";
        }

        requestAnimationFrame(loop);
      }

      // =========================
      // CONTROLS
      // =========================
      zoomFlightBtn.onclick = () => zoomTo(map, flightBounds);
      zoomAirspaceBtn.onclick = () => zoomTo(map, airspaceBounds);
      zoomBothBtn.onclick = () => zoomTo(map, unionBounds(flightBounds, airspaceBounds));

      playBtn.onclick = () => {
        if (simElapsed >= duration) {
          simElapsed = 0;
          currentIndex = 0;
          resetReplayDerivedState();
          renderEventLog(flightEventLog, simElapsed, duration, true);
        }

        playing = !playing;
        playBtn.textContent = playing ? "Pause" : "Play";
        if (playing) lastFrame = null;
      };

      slider.oninput = (e) => {
        simElapsed = toNumber(e.target.value, 0) * duration;
        currentIndex = 0;
        lastFrame = null;
        resetReplayDerivedState({ preserveLogs: true });
        renderEventLog(flightEventLog, simElapsed, duration, true);
      };

      speedSel.onchange = () => {
        speed = toNumber(speedSel.value, 1);
      };

      const featureToggleBtn = document.getElementById("feature-toggle");
      if (featureToggleBtn) {
        featureToggleBtn.onclick = () => {
          const panel = document.getElementById("feature-panel");
          if (panel) {
            panel.style.display = panel.style.display === "block" ? "none" : "block";
          }
        };
      }
    })();
  </script>
</body>
</html>
