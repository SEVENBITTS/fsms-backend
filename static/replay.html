<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VerityATLAS Flight Replay</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
  <link
    href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css"
    rel="stylesheet"
  />

  <style>
    :root {
      --font-mono: ui-monospace, Menlo, Consolas, monospace;

      --bg-panel: #ffffff;
      --bg-dark: rgba(10, 12, 16, 0.94);
      --bg-dark-soft: rgba(10, 12, 16, 0.92);

      --text-light: #e8eefc;
      --text-muted: #9aa4b2;
      --border-soft: rgba(255, 255, 255, 0.08);
      --border-mid: rgba(255, 255, 255, 0.12);

      --ok: #22c55e;
      --caution: #eab308;
      --warning: #f97316;
      --critical: #ef4444;

      --shadow-light: 0 4px 10px rgba(0, 0, 0, 0.15);
      --shadow-heavy: 0 18px 45px rgba(0, 0, 0, 0.45);

      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 12px;
      --radius-xl: 14px;
    
      --overlay-gap: 16px;
      --hud-width: 420px;
      --summary-width: 420px;
      --eventlog-width: 340px;
}

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
    }

    body {
      overflow: hidden;
      font-family: var(--font-mono);
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .panel {
      position: absolute;
      left: 50%;
      z-index: 10;
      transform: translateX(-50%);
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      background: var(--bg-panel);
      box-shadow: var(--shadow-light);
      font-size: 12px;
    }

    #controls { bottom: 90px; }
    #slider-container { bottom: 20px; }
    #speed-container { bottom: 140px; }
    #zoom-container { bottom: 190px; }

    input[type="range"] {
      width: 320px;
    }

    .btn {
      margin-left: 6px;
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: var(--radius-sm);
      background: #fff;
      cursor: pointer;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn[disabled] {
      opacity: 0.5;
      cursor: not-allowed;
    }

   #hud {
  position: absolute;
  top: 16px;
  left: 16px;
  z-index: 30;

  /* ✅ responsive width system */
  width: min(var(--hud-width), calc(100vw - 32px));
  min-width: 320px;
  max-width: 520px;

  padding: 14px;
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-lg);
  background: var(--bg-dark-soft);
  color: var(--text-light);
  box-shadow: var(--shadow-heavy);
  font-size: 12px;

  backdrop-filter: blur(6px);
}

    .hud-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .hud-title {
      font-size: 11px;
      letter-spacing: 0.12em;
      opacity: 0.8;
    }

    .hud-chip {
      padding: 4px 10px;
      border: 1px solid var(--border-mid);
      border-radius: 999px;
      font-weight: 800;
    }

    .hud-grid {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 6px 10px;
    }

    .hud-k { opacity: 0.65; }
    .hud-v { font-weight: 700; }

    .hud-divider {
      height: 1px;
      margin: 10px 0;
      background: var(--border-soft);
    }

    .hud-section-title {
      margin-bottom: 8px;
      font-size: 13px;
      opacity: 0.9;
    }

    .hud-status-ok { color: #00ff88; }
    .hud-status-caution { color: #ffbf00; }
    .hud-status-warning { color: #ff8800; }
    .hud-status-critical { color: #ff3b3b; font-weight: 700; }
    .hud-status-active { color: #00ffcc; }
    .hud-status-inactive { color: #888; }

    .risk-ok { color: var(--ok); font-weight: 700; }
    .risk-caution { color: var(--caution); }
    .risk-warning { color: var(--warning); }
    .risk-breach { color: var(--critical); }

    .risk-bar-wrap {
      width: 100%;
      height: 10px;
      margin: 8px 0 10px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
    }

    .risk-bar-fill {
      height: 100%;
      width: 0%;
      transition: width 0.2s ease;
    }

    .risk-fill-safe { background: var(--ok); }
    .risk-fill-caution { background: var(--caution); }
    .risk-fill-warning { background: var(--warning); }
    .risk-fill-critical { background: var(--critical); }

    #warn-strip-root {
  position: absolute;
  left: 16px;
  right: 16px;
  bottom: 70px;
  z-index: 20;
}

    .warnstrip {
      display: none;
      margin-top: 10px;
      padding: 8px 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.05);
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .warnstrip.show {
      display: block;
    }

    @keyframes breachFlash {
      0% { opacity: 1; }
      50% { opacity: 0.2; }
      100% { opacity: 1; }
    }

    .aircraft-dot {
      width: 14px;
      height: 14px;
      border: 2px solid #ffffff;
      border-radius: 50%;
      background: #00ff00;
      box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.25);
    }

    .ghost-dot {
      width: 12px;
      height: 12px;
      border: 2px dashed rgba(255, 255, 255, 0.95);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.25);
    }

    .breach-dot {
      width: 16px;
      height: 16px;
      border: 3px solid #ff0000;
      border-radius: 50%;
      background: rgba(255, 0, 0, 0.15);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.35);
      animation: breachFlash 0.8s infinite;
    }

    .entry-dot {
      width: 16px;
      height: 16px;
      border: 3px solid #ffbf00;
      border-radius: 50%;
      background: rgba(255, 191, 0, 0.18);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.3);
      animation: breachFlash 0.8s infinite;
    }

    #feature-menu {
      position: absolute;
      top: 100px;
      right: 15px;
      z-index: 50;
    }

    #feature-toggle {
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: white;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
      font-weight: 700;
      cursor: pointer;
    }

    #feature-panel {
      display: none;
      min-width: 220px;
      margin-top: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      background: white;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
      font-size: 12px;
    }

    #feature-panel label {
      display: block;
      margin: 4px 0;
    }

    #feature-panel hr {
      margin: 8px 0;
      border: none;
      border-top: 1px solid #ddd;
    }

  #event-log-panel {
  position: absolute;
  top: 16px;
  right: 16px;
  bottom: auto;
  z-index: 50;

  /* ✅ responsive width */
  width: min(var(--eventlog-width), calc(100vw - 32px));
  max-height: min(420px, calc(100vh - 32px));

  overflow: hidden;

  border: 1px solid var(--border-soft);
  border-radius: var(--radius-xl);
  background: var(--bg-dark);
  color: var(--text-light);
  box-shadow: var(--shadow-heavy);
  font-size: 12px;

  backdrop-filter: blur(6px);
}

    .event-log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 12px 10px;
      border-bottom: 1px solid var(--border-soft);
      background: rgba(255, 255, 255, 0.03);
    }

    .event-log-title {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.12em;
      opacity: 0.85;
    }

    .event-log-status {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
    }

    #event-log {
  max-height: calc(min(420px, calc(100vh - 32px)) - 48px);
  overflow-y: auto;
  padding: 10px;
}

    #event-log::-webkit-scrollbar {
      width: 8px;
    }

    #event-log::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
    }

    .event-item {
      margin-bottom: 8px;
      padding: 8px 10px;
      border: 1px solid transparent;
      border-radius: var(--radius-md);
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .event-item:hover {
      cursor: pointer;
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.08);
    }

    .event-item.selected {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.24);
    }

    .event-item.current {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.12);
      box-shadow: inset 3px 0 0 #00ffcc;
    }

    .event-time {
      margin-bottom: 2px;
      font-size: 11px;
      color: var(--text-muted);
      opacity: 0.7;
    }

    .event-type {
      margin-bottom: 4px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .event-text {
      font-size: 12px;
      font-weight: 600;
      line-height: 1.35;
      color: var(--text-light);
    }

    .event-sev-info { color: var(--ok); }
    .event-sev-caution { color: #facc15; }
    .event-sev-warning { color: #fb923c; }
    .event-sev-critical { color: #f87171; font-weight: 700; }

     #slider-container {
  bottom: 20px;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
}

#slider-wrap {
  position: relative;
  width: 320px;
}

#slider {
  width: 100%;
  position: relative;
  z-index: 2;
}

/* THIS is the key fix */
.slider-event-markers {
  position: absolute;
  left: 0;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  height: 20px;
  z-index: 3; /* 👈 ensure above slider */
  pointer-events: none;
}

.slider-event-marker {
  position: absolute;
  width: 2px;
  height: 18px;
  border-radius: 2px;
  transform: translateX(-50%);
  opacity: 1;
  box-shadow: 0 0 4px rgba(255,255,255,0.6);
}

.slider-event-marker.info { background: #7dd3fc; }
.slider-event-marker.caution { background: #facc15; }
.slider-event-marker.warning { background: #fb923c; }
.slider-event-marker.critical { background: #ef4444; }

.summary-panel {
  position: absolute;
  top: 16px;
  left: calc(16px + var(--hud-width) + var(--overlay-gap));
  z-index: 40;

  display: flex;
  flex-direction: column;
  gap: 12px;

  width: clamp(320px, calc(100vw - var(--hud-width) - var(--eventlog-width) - 64px), var(--summary-width));
max-width: 520px;


  animation: fadeIn 0.4s ease;
}

.summary-card {
  min-width: 0;
  width: 100%;
  height: auto;
  min-height: 0;

  background: rgba(15, 18, 28, 0.92);
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 12px;
  color: #fff;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
  overflow: hidden;
}

.summary-card__header {
  display: flex;
  align-items: stretch;
}

.summary-card__toggle {
  width: 100%;
  min-height: 42px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;

  background: transparent;
  border: 0;
  color: #fff;
  cursor: pointer;
  text-align: left;
  font: inherit;
}

.summary-card__title {
  font-size: 11px;
  text-transform: uppercase;
  color: #94a3b8;
  font-weight: 800;
  letter-spacing: 0.08em;
}

.summary-card__icon {
  color: #e5e7eb;
  font-size: 18px;
  line-height: 1;
  flex: 0 0 auto;
}

.summary-card__body {
  border-top: 1px solid rgba(255, 255, 255, 0.08);
}

.summary-card__content {
  padding: 12px 14px;
}

.summary-card.is-collapsed .summary-card__body {
  display: none;
}

.summary-card.is-expanded .summary-card__body {
  display: block;
}

.summary-value {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 0.4rem;
}

.summary-subtitle {
  margin-top: 6px;
  font-size: 13px;
  color: #b8bfd3;
  margin-bottom: 0.25rem;
  opacity: 0.9;
}

.summary-subtitle.copyable {
  transition: color 0.2s ease, text-shadow 0.2s ease;
}

.summary-subtitle.copyable:hover {
  color: #cbd5e1;
  text-shadow: 0 0 10px rgba(148, 163, 184, 0.18);
}

.status-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.status-pill {
  background: rgba(255, 255, 255, 0.06);
  border-radius: 10px;
  padding: 10px;
  text-align: center;
}

.status-label {
  font-size: 12px;
  color: #b8bfd3;
}

.status-value {
  font-size: 20px;
  font-weight: 700;
  margin-top: 4px;
  color: #f8fafc;
}

#summary-latest-run {
  font-size: 16px;
  line-height: 1.3;
  word-break: break-word;
}

#summary-breach-covered {
  font-weight: 600;
  color: #60a5fa;
  margin-bottom: 0.6rem;
}

.summary-actions {
  display: flex;
  gap: 0.5rem;
  margin-top: 0.9rem;
  flex-wrap: wrap;
}

.summary-action-btn {
  border: 1px solid rgba(148, 163, 184, 0.35);
  background: rgba(15, 23, 42, 0.85);
  color: #e5e7eb;
  padding: 0.45rem 0.8rem;
  border-radius: 0.5rem;
  font-size: 0.85rem;
  cursor: pointer;
  transition: background 0.2s ease, transform 0.15s ease;
  backdrop-filter: blur(4px);
}

.summary-action-btn:active {
  transform: translateY(0);
  opacity: 0.9;
}

.scenario-list {
  margin-top: 12px;
}

.side-panel {
  position: absolute;
  top: 16px;

  /* ✅ dynamic positioning between summary and event log */
  right: calc(16px + var(--eventlog-width) + var(--overlay-gap));
  animation: slideUp 0.25s ease;
  z-index: 10000;

  width: 320px;
  max-width: min(360px, calc(100vw - var(--eventlog-width) - 48px));
  max-height: min(420px, calc(100vh - 32px));

  overflow-y: auto;
  padding: 16px;

  border-radius: 16px;
  border: 1px solid rgba(255, 255, 255, 0.12);
  background: rgba(15, 18, 28, 0.97);
  color: #e5e7eb;
  box-shadow: 0 18px 45px rgba(0, 0, 0, 0.45);
  backdrop-filter: blur(10px);
/* ✅ ADD THIS RIGHT AFTER */
  animation: slideUp 0.25s ease;
}

/* Closing state */
.side-panel.closing {
  animation: slideDown 0.2s ease forwards;
}

.side-panel {
  will-change: transform, opacity;
}

@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

@keyframes slideDown {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(20px); opacity: 0; }
}

.side-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.side-panel-close {
  border: none;
  background: transparent;
  color: #e5e7eb;
  font-size: 24px;
  cursor: pointer;
}


.detail-label {
  color: rgba(255, 255, 255, 0.72);   /* softer label */
  font-weight: 700;
}

.detail-value {
  word-break: break-word;
  color: #f8fafc;                 /* FULL white for readability */
  font-weight: 500;
}

.side-panel .detail-value,
.side-panel .detail-label {
  opacity: 1;
  text-shadow: none;
}

.side-panel .badge {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
  background: rgba(255, 255, 255, 0.08);
  color: #f8fafc;
}

.summary-action-btn:hover {
  background: rgba(30, 41, 59, 0.95);
  transform: translateY(-1px);
}

.summary-action-btn:hover {
  box-shadow: 0 0 0 1px rgba(96, 165, 250, 0.3);
}

#summary-flight,
#summary-flight-date,
#summary-flight-time,
#summary-report-created,
#summary-last-event-time,
#summary-version {
  color: #94a3b8;
  font-size: 0.85rem;
  word-break: break-word;
}

.scenario-row {
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;

  padding: 6px 10px;
  border-radius: 8px;
  margin-bottom: 6px;

  background: rgba(255, 255, 255, 0.035);
  transition: background 0.15s ease, transform 0.1s ease;
}

.scenario-row:hover {
  background: rgba(255,255,255,0.08);
  transform: translateX(2px);
}

.scenario-row.active {
  outline: 1px solid rgba(96, 165, 250, 0.45);
  background: rgba(255,255,255,0.10) !important;
}

.scenario-name {
  color: #e5e7eb;
}

.scenario-status {
  font-weight: 700;
}

.tone-pass {
  color: #86efac;
}

.tone-review {
  color: #fcd34d;
}

.tone-fail {
  color: #fca5a5;
}

.tone-neutral {
  color: #cbd5e1;
}

/* Scenario row color states */
.scenario-row.pass-row {
  border-left: 4px solid #22c55e;
}

.scenario-row.review-row {
  border-left: 4px solid #f59e0b;
}

.scenario-row.fail-row {
  border-left: 4px solid #ef4444;
}

#card-scenarios .summary-card__body {
  max-height: none;
  overflow: visible;
}

#card-scenarios .summary-card__content {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

#scenario-list {
  max-height: 220px;
  overflow-y: auto;
  padding-right: 6px;
}

/* Classification badge colors */
.badge {
  display: inline-block;
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.04em;
}

.badge.PASS {
  background: rgba(34, 197, 94, 0.18);
  color: #86efac;
}

.badge.REVIEW {
  background: rgba(245, 158, 11, 0.18);
  color: #fcd34d;
}

.badge.FAIL {
  background: rgba(239, 68, 68, 0.18);
  color: #fca5a5;
}

/* Optional: lead-time style labels if you want those too */
.badge.EARLY {
  background: rgba(34, 197, 94, 0.18);
  color: #86efac;
}

.badge.EDGE {
  background: rgba(245, 158, 11, 0.18);
  color: #fcd34d;
}

.badge.NO-BREACH {
  background: rgba(148, 163, 184, 0.18);
  color: #cbd5e1;
}


  .detail-grid {
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: 8px 12px;
  }

body {
  position: relative;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 1200px) {
  .summary-panel {
    top: 260px;
    left: 16px;
    right: 16px;
    width: auto;
    max-width: none;
  }

@media (max-width: 1200px) {
  /* existing rules */
}

/* ✅ ADD HERE */
@media (max-width: 768px) {
  #hud,
  .summary-panel,
  #event-log-panel,
  .side-panel {
    left: 12px;
    right: 12px;
    width: auto;
    min-width: 0;
    max-width: none;
  }

  #hud {
    top: 12px;
  }

  .summary-panel {
    top: 270px;
  }

  #event-log-panel {
    top: auto;
    bottom: 140px;
    max-height: 220px;
  }

  .side-panel {
    bottom: 12px;
  }

  .status-grid {
    grid-template-columns: 1fr;
  }
}


  /* Event log becomes right-docked but smaller */
  #event-log-panel {
    top: 16px;
    right: 16px;
    width: 280px;
    max-height: 50vh;
  }

  /* Side panel becomes bottom drawer */
  .side-panel {
    top: auto;
    bottom: 16px;
    right: 16px;
    left: 16px;
    width: auto;
    max-width: none;
  }
}

  </style>
</head>

<body>
  <div id="map"></div>

  <div id="speed-container" class="panel">
    Speed:
    <select id="speed">
      <option value="0.25">0.25×</option>
      <option value="0.5">0.5×</option>
      <option value="1" selected>1×</option>
      <option value="2">2×</option>
      <option value="5">5×</option>
    </select>
  </div>

  <div id="zoom-container" class="panel">
    <button id="zoomFlight" class="btn">Flight</button>
    <button id="zoomAirspace" class="btn" disabled>Airspace</button>
    <button id="zoomBoth" class="btn" disabled>Both</button>
  </div>

  <div id="controls" class="panel">
    <button id="play">Play</button>
  </div>

 
 <div id="slider-container" class="panel">
  <div id="slider-wrap">
    <input id="slider" type="range" min="0" max="1" step="0.0001" value="0" />
    <div id="slider-event-markers" class="slider-event-markers"></div>
  </div>
</div>

  <div id="warn-strip-root"></div>

  <div id="event-log-panel">
    <div class="event-log-header">
      <div class="event-log-title">EVENT TIMELINE</div>
      <div id="event-log-status" class="event-log-status">0 events</div>
    </div>
    <div id="event-log"></div>
  </div>

<div id="summary-panel" class="summary-panel">
  <!-- Scenarios -->
  <article class="summary-card is-expanded" id="card-scenarios" data-card-id="card-scenarios">
    <header class="summary-card__header">
      <button
        class="summary-card__toggle"
        type="button"
        onclick="toggleSummaryCard('card-scenarios')"
        aria-expanded="true"
        aria-controls="summary-card-body-card-scenarios"
      >
        <span class="summary-card__title">Scenarios</span>
        <span class="summary-card__icon" aria-hidden="true">–</span>
      </button>
    </header>

    <div id="summary-card-body-card-scenarios" class="summary-card__body">
      <div class="summary-card__content">
        <div class="summary-value" id="summary-total">0</div>
        <div class="summary-subtitle" id="summary-breach-covered">0 breach scenarios covered</div>
        <div class="summary-subtitle">Validation report snapshot</div>
        <div class="summary-subtitle" id="summary-flight">Flight: Unknown</div>
        <div class="summary-subtitle" id="summary-flight-date">Flight date: Unknown</div>
        <div class="summary-subtitle" id="summary-flight-time">Flight time: Unknown</div>
        <div class="summary-subtitle" id="summary-report-created">Report created: Unknown</div>
        <div class="summary-subtitle" id="summary-last-event-time">Last event time: Unknown</div>
        <div class="summary-subtitle" id="summary-version">Report version: Unknown</div>

        <div class="summary-actions">
          <button id="export-summary-json" class="summary-action-btn">Export JSON</button>
          <button id="export-summary-csv" class="summary-action-btn">Export CSV</button>
        </div>

        <div id="scenario-list" class="scenario-list"></div>
      </div>
    </div>
  </article>

  <!-- Status -->
  <article class="summary-card is-collapsed" id="card-status" data-card-id="card-status">
    <header class="summary-card__header">
      <button
        class="summary-card__toggle"
        type="button"
        onclick="toggleSummaryCard('card-status')"
        aria-expanded="false"
        aria-controls="summary-card-body-card-status"
      >
        <span class="summary-card__title">Status</span>
        <span class="summary-card__icon" aria-hidden="true">+</span>
      </button>
    </header>
    <div id="summary-card-body-card-status" class="summary-card__body" hidden>
      <div class="summary-card__content">
        <div class="status-grid">
          <div class="status-pill">
            <div class="status-label">PASS</div>
            <div class="status-value" id="summary-pass">0</div>
          </div>
          <div class="status-pill">
            <div class="status-label">REVIEW</div>
            <div class="status-value" id="summary-review">0</div>
          </div>
          <div class="status-pill">
            <div class="status-label">FAIL</div>
            <div class="status-value" id="summary-fail">0</div>
          </div>
        </div>
      </div>
    </div>
  </article>

  <!-- Latest Run -->
  <article class="summary-card is-collapsed" id="card-latest-run" data-card-id="card-latest-run">
    <header class="summary-card__header">
      <button
        class="summary-card__toggle"
        type="button"
        onclick="toggleSummaryCard('card-latest-run')"
        aria-expanded="false"
        aria-controls="summary-card-body-card-latest-run"
      >
        <span class="summary-card__title">Latest Run</span>
        <span class="summary-card__icon" aria-hidden="true">+</span>
      </button>
    </header>
    <div id="summary-card-body-card-latest-run" class="summary-card__body" hidden>
      <div class="summary-card__content">
        <div class="summary-value" id="summary-latest-run">Unknown</div>
      </div>
    </div>
  </article>

  <!-- Avg Lead Time -->
  <article class="summary-card is-collapsed" id="card-avg-lead" data-card-id="card-avg-lead">
    <header class="summary-card__header">
      <button
        class="summary-card__toggle"
        type="button"
        onclick="toggleSummaryCard('card-avg-lead')"
        aria-expanded="false"
        aria-controls="summary-card-body-card-avg-lead"
      >
        <span class="summary-card__title">Avg Lead Time</span>
        <span class="summary-card__icon" aria-hidden="true">+</span>
      </button>
    </header>
    <div id="summary-card-body-card-avg-lead" class="summary-card__body" hidden>
      <div class="summary-card__content">
        <div class="summary-value" id="summary-avg-lead">N/A</div>
        <div class="summary-subtitle">PASS breach scenarios only</div>
      </div>
    </div>
  </article>
</div>

  <div id="feature-menu">
    <button id="feature-toggle">⚙ Features</button>
    <div id="feature-panel">
      <label><input type="checkbox" id="toggleTrend" checked /> Trend Vector</label>
      <label><input type="checkbox" id="togglePrediction" checked /> Breach Predictor</label>
      <label><input type="checkbox" id="toggleEnvelope" /> Predictive Envelope</label>
      <label><input type="checkbox" id="toggleCone" /> 3D Zones</label>
      <label><input type="checkbox" id="toggleKalman" /> Smooth Track</label>
      <label><input type="checkbox" id="toggleVectors" /> Heading / Speed Overlay</label>

      <hr />
      <div><b>Airspace Filters</b></div>
      <label><input type="checkbox" class="zone-filter" value="controlled" checked /> Controlled</label>
      <label><input type="checkbox" class="zone-filter" value="restricted" checked /> Restricted</label>
      <label><input type="checkbox" class="zone-filter" value="prohibited" checked /> Prohibited</label>
      <label><input type="checkbox" class="zone-filter" value="danger" checked /> Danger</label>
    </div>
  </div>

  <div id="hud"></div>
  <div id="scenario-detail-mount"></div>

  <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
  <script type="module" src="/static/replay.js"></script>
  
</body>
</html>
