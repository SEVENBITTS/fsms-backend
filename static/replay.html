<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>FSMS Flight Replay</title>

<link rel="icon" type="image/x-icon" href="/static/favicon.ico">
<link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet"/>

<style>
html, body { margin:0; height:100%; }
#map { height:100%; }

.panel{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  background:white;
  padding:8px 12px;
  border-radius:6px;
  z-index:10;
  box-shadow:0 4px 10px rgba(0,0,0,0.15);
  font-family: ui-monospace, Menlo, Consolas, monospace;
  font-size:12px;
}

#controls{ bottom:90px; }
#slider-container{ bottom:20px; }
#speed-container{ bottom:140px; }
#zoom-container{ bottom:190px; }

input[type=range]{ width:320px; }

/* ===============================
   Mission Control HUD
================================ */
#hud{
  position:absolute;
  top:15px;
  left:15px;
  background:rgba(10,12,16,0.92);
  color:#e8eefc;
  padding:14px;
  border-radius:12px;
  font-family: ui-monospace, Menlo, Consolas, monospace;
  font-size:12px;
  min-width:330px;
  z-index:30;
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 18px 45px rgba(0,0,0,0.45);
}

.hud-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.hud-title{
  font-size:11px;
  letter-spacing:0.12em;
  opacity:0.8;
}

.hud-chip{
  padding:4px 10px;
  border-radius:999px;
  font-weight:800;
  border:1px solid rgba(255,255,255,0.12);
}

.hud-grid{
  display:grid;
  grid-template-columns:90px 1fr;
  gap:6px 10px;
}

.hud-k{ opacity:0.65; }
.hud-v{ font-weight:700; }

.hud-divider{
  height:1px;
  background:rgba(255,255,255,0.08);
  margin:10px 0;
}

/* Risk colours */
.risk-safe    { color:#00ff00; }
.risk-caution { color:#ffff00; }
.risk-warning { color:#ffbf00; }
.risk-breach  { color:#ff0000; }
.risk-unknown { color:#bbbbbb; }

/* Risk bar */
.riskbar{
  grid-column:1 / -1;
  position:relative;
  height:12px;
  border-radius:999px;
  background:rgba(255,255,255,0.08);
  overflow:hidden;
  margin-top:6px;
}

.riskbar-fill{
  height:100%;
  width:0%;
  transition:width 0.15s linear;
}

.riskbar-fill.risk-safe    { background:#00ff00; }
.riskbar-fill.risk-caution { background:#ffff00; }
.riskbar-fill.risk-warning { background:#ffbf00; }
.riskbar-fill.risk-breach  { background:#ff0000; }
.riskbar-fill.risk-unknown { background:#bbbbbb; }

.riskbar-label{
  position:absolute;
  top:14px;
  font-size:10px;
  opacity:0.7;
}
.label20{ left:20%; transform:translateX(-50%); }
.label50{ left:50%; transform:translateX(-50%); }

.riskbar-tick{
  position:absolute;
  top:-2px;
  width:2px;
  height:16px;
  background:#ffffff66;
}
.tick20{ left:20%; }
.tick50{ left:50%; }

.warnstrip{
  margin-top:10px;
  padding:8px 10px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.10);
  background:rgba(255,255,255,0.05);
  font-weight:800;
  letter-spacing:0.06em;
  text-transform:uppercase;
  display:none;
}
.warnstrip.show{ display:block; }

@keyframes breachFlash{
  0%{ opacity:1; }
  50%{ opacity:0.2; }
  100%{ opacity:1; }
}
.breach-flash{ animation: breachFlash 0.6s infinite; }

/* Aircraft marker */
.aircraft-dot{
  width:14px;
  height:14px;
  border-radius:50%;
  background:#00ff00;
  border:2px solid #ffffff;
  box-shadow:0 0 0 2px rgba(0,0,0,0.25);
}

/* Trend ghost marker */
.ghost-dot{
  width:12px;
  height:12px;
  border-radius:50%;
  border:2px dashed rgba(255,255,255,0.95);
  background:rgba(255,255,255,0.10);
  box-shadow:0 0 0 2px rgba(0,0,0,0.25);
}

/* Vertical breach prediction marker */
.breach-dot{
  width:16px;
  height:16px;
  border-radius:50%;
  border:3px solid #ff0000;
  background:rgba(255,0,0,0.15);
  box-shadow:0 0 0 3px rgba(255,255,255,0.35);
  animation: breachFlash 0.8s infinite;
}

/* Horizontal entry prediction marker */
.entry-dot{
  width:16px;
  height:16px;
  border-radius:50%;
  border:3px solid #ffbf00;
  background:rgba(255,191,0,0.18);
  box-shadow:0 0 0 3px rgba(255,255,255,0.30);
  animation: breachFlash 0.8s infinite;
}

/* Trend chip */
.trend-chip{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:2px 8px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.06);
  font-weight:800;
  letter-spacing:0.06em;
}
.trend-arrow{
  font-size:14px;
  line-height:1;
}

/* Buttons */
.btn{
  padding:6px 10px;
  border:1px solid #ccc;
  border-radius:6px;
  background:#fff;
  cursor:pointer;
  margin-left:6px;
}
.btn:active{ transform: translateY(1px); }
.btn[disabled]{ opacity:0.5; cursor:not-allowed; }

/* Feature Toggle Menu */
#feature-menu{
  position:absolute;
  top:100px;
  right:15px;
  z-index:50;
  font-family: ui-monospace, Menlo, Consolas, monospace;
}

#feature-toggle{
  background:white;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  box-shadow:0 4px 10px rgba(0,0,0,0.25);
  cursor:pointer;
  font-weight:700;
}

#feature-panel{
  display:none;
  margin-top:8px;
  background:white;
  padding:10px 12px;
  border-radius:8px;
  box-shadow:0 8px 20px rgba(0,0,0,0.25);
  min-width:220px;
}

#feature-panel label{
  display:block;
  margin:4px 0;
  font-size:12px;
}

#feature-panel hr{
  border:none;
  border-top:1px solid #ddd;
  margin:8px 0;
}
</style>
</head>

<body>
<div id="map"></div>

<div id="speed-container" class="panel">
  Speed:
  <select id="speed">
    <option value="0.25">0.25×</option>
    <option value="0.5">0.5×</option>
    <option value="1" selected>1×</option>
    <option value="2">2×</option>
    <option value="5">5×</option>
  </select>
</div>

<div id="zoom-container" class="panel">
  Zoom:
  <button id="zoomFlight" class="btn">Flight</button>
  <button id="zoomAirspace" class="btn" disabled>Airspace</button>
  <button id="zoomBoth" class="btn" disabled>Both</button>
</div>

<div id="controls" class="panel">
  <button id="play">Play</button>
</div>

<div id="slider-container" class="panel">
  <input id="slider" type="range" min="0" max="1" step="0.0001" value="0"/>
</div>

<div id="feature-menu">
  <button id="feature-toggle">⚙ Features</button>

  <div id="feature-panel">
    <label><input type="checkbox" id="toggleTrend" checked> Trend Vector</label>
    <label><input type="checkbox" id="togglePrediction" checked> Breach Predictor</label>
    <label><input type="checkbox" id="toggleCone"> 3D Zones</label>
    <label><input type="checkbox" id="toggleKalman"> Smooth Track</label>
    <label><input type="checkbox" id="toggleVectors"> Heading / Speed Overlay</label>

    <hr>
    <div><b>Airspace Filters</b></div>
    <label><input type="checkbox" class="zone-filter" value="controlled" checked> Controlled</label>
    <label><input type="checkbox" class="zone-filter" value="restricted" checked> Restricted</label>
    <label><input type="checkbox" class="zone-filter" value="prohibited" checked> Prohibited</label>
    <label><input type="checkbox" class="zone-filter" value="danger" checked> Danger</label>
  </div>
</div>

<div id="hud"></div>

<script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
<script>
(async () => {
  const flight_id = "3422422e-f6b4-4059-8de4-93145daecddc";
  const API_URL = `http://localhost:5000/api/fsms/replay/${flight_id}`;
  const MAP_KEY = "lxT2mb9w5c89C9E9kziZ";
  const AIRSPACE_URL = `/api/airspace/by-flight/${flight_id}?buffer_m=5000`;
  const COMPLIANCE_URL = `/api/compliance/airspace/by-flight/${flight_id}`;
  const TREND_SECONDS = 10;

  const slider = document.getElementById("slider");
  const playBtn = document.getElementById("play");
  const speedSel = document.getElementById("speed");
  const hud = document.getElementById("hud");

  const zoomFlightBtn = document.getElementById("zoomFlight");
  const zoomAirspaceBtn = document.getElementById("zoomAirspace");
  const zoomBothBtn = document.getElementById("zoomBoth");

  const FEATURES = {
    trend: true,
    prediction: true,
    cone: false,
    kalman: false,
    vectors: false
  };

  let playing = false;
  let speed = 1;
  let simElapsed = 0;
  let lastFrame = null;
  let currentIndex = 0;
  let flightBounds = null;
  let airspaceBounds = null;
  let airspaceGeojson = null;
  let lastSmoothedPos = null;

  function bindToggle(id, key){
    const el = document.getElementById(id);
    if (!el) return;
    FEATURES[key] = !!el.checked;
    el.addEventListener("change", (e) => {
      FEATURES[key] = e.target.checked;
    });
  }

  function setupFeatureToggles(){
    bindToggle("toggleTrend", "trend");
    bindToggle("togglePrediction", "prediction");
    bindToggle("toggleCone", "cone");
    bindToggle("toggleKalman", "kalman");
    bindToggle("toggleVectors", "vectors");
  }

  function calculateRisk(marginM){
    if (marginM === null || marginM === undefined || Number.isNaN(marginM)) {
      return { label: "UNKNOWN", cls: "risk-unknown" };
    }
    if (marginM < 0) return { label: "BREACH", cls: "risk-breach" };
    if (marginM < 20) return { label: "WARNING", cls: "risk-warning" };
    if (marginM < 50) return { label: "CAUTION", cls: "risk-caution" };
    return { label: "SAFE", cls: "risk-safe" };
  }

function fmtLimit(v){
  if (v === null || v === undefined) return "—";

  const m = Number(v);

  // detect common 400 ft limit
  if (Math.abs(m - 121.92) < 2) {
    return "120.0 m (400 ft)";
  }

  const ft = m * 3.28084;

  return `${m.toFixed(1)} m (${Math.round(ft)} ft)`;
}
function fmtM(v){
  if (v === null || v === undefined || Number.isNaN(v)) return "—";
  return `${Number(v).toFixed(1)} m`;
}

  function vsArrow(vz){
    if (vz === null || vz === undefined || Number.isNaN(vz)) return "—";
    if (vz > 0.15) return "↑";
    if (vz < -0.15) return "↓";
    return "→";
  }

  function clamp(n, a, b){
    return Math.max(a, Math.min(b, n));
  }

  function marginToPct(m){
    if (m === null || m === undefined || Number.isNaN(m)) return 0;
    return clamp(Number(m), 0, 100);
  }

  function predictTtb(marginM, vzMps){
    if (marginM === null || marginM === undefined || Number.isNaN(marginM)) return null;
    if (vzMps === null || vzMps === undefined || Number.isNaN(vzMps)) return null;
    if (vzMps <= 0) return null;
    if (marginM <= 0) return 0;
    return marginM / vzMps;
  }

  function bearingDeg(a, b){
    const toRad = d => d * Math.PI / 180;
    const toDeg = r => r * 180 / Math.PI;
    const lat1 = toRad(a.lat), lat2 = toRad(b.lat);
    const dLon = toRad(b.lng - a.lng);
    const y = Math.sin(dLon) * Math.cos(lat2);
    const x = Math.cos(lat1) * Math.sin(lat2) -
              Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
    let brng = toDeg(Math.atan2(y, x));
    brng = (brng + 360) % 360;
    return brng;
  }

  function bearingArrow(deg){
    const dirs = ["↑","↗","→","↘","↓","↙","←","↖"];
    const idx = Math.round(deg / 45) % 8;
    return dirs[idx];
  }

  function kalmanLike(prev, current){
    const k = 0.2;
    return {
      lat: prev.lat + k * (current.lat - prev.lat),
      lng: prev.lng + k * (current.lng - prev.lng),
      alt: prev.alt + k * (current.alt - prev.alt)
    };
  }

  function distanceM(a, b){
    const R = 6371000;
    const lat1 = a.lat * Math.PI / 180;
    const lat2 = b.lat * Math.PI / 180;
    const dLat = (b.lat - a.lat) * Math.PI / 180;
    const dLon = (b.lng - a.lng) * Math.PI / 180;
    const x = Math.sin(dLat / 2) ** 2 +
      Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) ** 2;
    return 2 * R * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
  }

  function pointInRing(point, ring){
    const x = point.lng;
    const y = point.lat;
    let inside = false;

    for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
      const xi = ring[i][0], yi = ring[i][1];
      const xj = ring[j][0], yj = ring[j][1];

      const intersect =
        ((yi > y) !== (yj > y)) &&
        (x < ((xj - xi) * (y - yi)) / ((yj - yi) || 1e-12) + xi);

      if (intersect) inside = !inside;
    }

    return inside;
  }

  function pointInPolygon(point, geometry){
    if (!geometry) return false;

    if (geometry.type === "Polygon") {
      return pointInRing(point, geometry.coordinates[0]);
    }

    if (geometry.type === "MultiPolygon") {
      return geometry.coordinates.some(poly => pointInRing(point, poly[0]));
    }

    return false;
  }

  function getZoneFeatureById(zoneId){
    if (!airspaceGeojson?.features?.length || !zoneId) return null;

    return airspaceGeojson.features.find(f =>
      String(f?.properties?.id) === String(zoneId)
    ) || null;
  }

  function predictBoundaryEntry(currentTimeMs, zoneFeature, horizonSeconds = 60, stepSeconds = 1){
    if (!zoneFeature?.geometry) return null;

    const startPos = interpolate(currentTimeMs);
    const startInside = pointInPolygon(startPos, zoneFeature.geometry);

    // only predict boundary entry when currently outside
    if (startInside) return null;

    for (let s = stepSeconds; s <= horizonSeconds; s += stepSeconds) {
      const tFuture = Math.min(t0 + duration, currentTimeMs + s * 1000);
      const posFuture = interpolate(tFuture);

      if (pointInPolygon(posFuture, zoneFeature.geometry)) {
        return {
          ttb_s: s,
          pos: posFuture,
          t_ms: tFuture
        };
      }
    }

    return null;
  }

  let data;
  try {
    const r = await fetch(API_URL);
    if (!r.ok) throw new Error("Replay fetch failed");
    data = await r.json();
  } catch (e) {
    alert("Replay failed: " + e.message);
    return;
  }

  if (!data.replay?.length) {
    alert("No replay data");
    return;
  }

  const pts = data.replay.map(p => ({
    lng: p.lon,
    lat: p.lat,
    alt: p.altitude_m ?? 0,
    t: new Date(p.timestamp).getTime()
  }));

  const t0 = pts[0].t;
  const duration = pts[pts.length - 1].t - t0;

  flightBounds = new maplibregl.LngLatBounds();
  pts.forEach(p => flightBounds.extend([p.lng, p.lat]));

  let pointStatus = [];
  try {
    const cr = await fetch(COMPLIANCE_URL);
    if (cr.ok) {
      const cjson = await cr.json();
      pointStatus = cjson.items || [];
    }
  } catch (e) {
    console.warn("Compliance fetch error:", e.message);
  }

  const map = new maplibregl.Map({
    container: "map",
    style: `https://api.maptiler.com/maps/streets-v2/style.json?key=${MAP_KEY}`,
    center: [pts[0].lng, pts[0].lat],
    zoom: 14,
    pitch: 50
  });

  map.addControl(new maplibregl.NavigationControl());

  const aircraftEl = document.createElement("div");
  aircraftEl.className = "aircraft-dot";

  const aircraft = new maplibregl.Marker({ element: aircraftEl })
    .setLngLat([pts[0].lng, pts[0].lat])
    .addTo(map);

  const ghostEl = document.createElement("div");
  ghostEl.className = "ghost-dot";

  const ghost = new maplibregl.Marker({ element: ghostEl })
    .setLngLat([pts[0].lng, pts[0].lat])
    .addTo(map);

  const breachEl = document.createElement("div");
  breachEl.className = "breach-dot";
  breachEl.style.display = "none";

  const breachMarker = new maplibregl.Marker({ element: breachEl })
    .setLngLat([pts[0].lng, pts[0].lat])
    .addTo(map);

  const entryEl = document.createElement("div");
  entryEl.className = "entry-dot";
  entryEl.style.display = "none";

  const entryMarker = new maplibregl.Marker({ element: entryEl })
    .setLngLat([pts[0].lng, pts[0].lat])
    .addTo(map);

  function ensureTrendLayer(){
    if (map.getSource("trend")) return;

    map.addSource("trend", {
      type: "geojson",
      data: {
        type: "Feature",
        geometry: {
          type: "LineString",
          coordinates: [[pts[0].lng, pts[0].lat], [pts[0].lng, pts[0].lat]]
        }
      }
    });

    map.addLayer({
      id: "trend-line",
      type: "line",
      source: "trend",
      paint: {
        "line-color": "#ffffff",
        "line-opacity": 0.70,
        "line-width": 2,
        "line-dasharray": [2, 2]
      }
    });
  }

  function updateZoneFilter(){
    if (!map.getLayer("airspace-fill")) return;

    const checked = Array.from(
      document.querySelectorAll(".zone-filter:checked")
    ).map(cb => cb.value);

    if (!checked.length) {
      map.setFilter("airspace-fill", ["==", 1, 0]);
      map.setFilter("airspace-outline", ["==", 1, 0]);
      if (map.getLayer("airspace-3d")) {
        map.setFilter("airspace-3d", ["==", 1, 0]);
      }
      return;
    }

    const filter = [
      "in",
      ["downcase", ["to-string", ["coalesce", ["get", "zone_type"], ""]]],
      ["literal", checked]
    ];

    map.setFilter("airspace-fill", filter);
    map.setFilter("airspace-outline", filter);
    if (map.getLayer("airspace-3d")) {
      map.setFilter("airspace-3d", filter);
    }
  }

  function interpolate(time){
    while (currentIndex < pts.length - 2 && pts[currentIndex + 1].t <= time) currentIndex++;
    const a = pts[currentIndex];
    const b = pts[currentIndex + 1] ?? a;
    const f = b.t === a.t ? 0 : (time - a.t) / (b.t - a.t);
    return {
      lng: a.lng + (b.lng - a.lng) * f,
      lat: a.lat + (b.lat - a.lat) * f,
      alt: a.alt + (b.alt - a.alt) * f
    };
  }

  function computeGeojsonBounds(fc){
    const b = new maplibregl.LngLatBounds();
    for (const f of (fc.features || [])) {
      const g = f.geometry;
      if (!g) continue;
      if (g.type === "Polygon") {
        for (const ring of g.coordinates) for (const coord of ring) b.extend(coord);
      } else if (g.type === "MultiPolygon") {
        for (const poly of g.coordinates) for (const ring of poly) for (const coord of ring) b.extend(coord);
      }
    }
    return b;
  }

  function zoomTo(bounds){
    if (!bounds) return;
    map.fitBounds(bounds, { padding: 80, duration: 800 });
  }

  function unionBounds(a, b){
    if (!a && !b) return null;
    if (a && !b) return a;
    if (!a && b) return b;
    const u = new maplibregl.LngLatBounds(a.getSouthWest(), a.getNorthEast());
    u.extend(b.getSouthWest());
    u.extend(b.getNorthEast());
    return u;
  }

  zoomFlightBtn.onclick = () => zoomTo(flightBounds);
  zoomAirspaceBtn.onclick = () => zoomTo(airspaceBounds);
  zoomBothBtn.onclick = () => zoomTo(unionBounds(flightBounds, airspaceBounds));

  map.on("load", async () => {
    setupFeatureToggles();
    ensureTrendLayer();

    try {
      const r = await fetch(AIRSPACE_URL);
      if (!r.ok) throw new Error("Airspace fetch failed");
      const airspaceData = await r.json();
      airspaceGeojson = airspaceData;

      map.addSource("airspace", { type: "geojson", data: airspaceData });

      map.addLayer({
        id: "airspace-fill",
        type: "fill",
        source: "airspace",
        paint: {
          "fill-color": [
            "match", ["get","zone_type"],
            "controlled", "#3366ff",
            "restricted", "#ff0000",
            "prohibited", "#cc00ff",
            "danger", "#ffcc00",
            "#999999"
          ],
          "fill-opacity": 0.30
        }
      });

      map.addLayer({
        id: "airspace-outline",
        type: "line",
        source: "airspace",
        paint: {
          "line-color": "#ff0000",
          "line-width": 2
        }
      });

      map.addLayer({
        id: "airspace-3d",
        type: "fill-extrusion",
        source: "airspace",
        layout: { visibility: "none" },
        paint: {
          "fill-extrusion-color": "#ff0000",
          "fill-extrusion-height": [
            "*",
            ["coalesce", ["to-number", ["get", "upper_m"]], 0],
            2
          ],
          "fill-extrusion-base": [
            "*",
            ["coalesce", ["to-number", ["get", "lower_m"]], 0],
            2
          ],
          "fill-extrusion-opacity": 0.25
        }
      });

      if (airspaceData?.features?.length) {
        airspaceBounds = computeGeojsonBounds(airspaceData);
        zoomAirspaceBtn.disabled = false;
        zoomBothBtn.disabled = false;
      }

      document
        .querySelectorAll(".zone-filter")
        .forEach(cb => cb.addEventListener("change", updateZoneFilter));
      updateZoneFilter();
    } catch (e) {
      console.warn("Airspace not loaded:", e.message);
    }

    map.addSource("flight-path", {
      type: "geojson",
      data: {
        type: "Feature",
        geometry: {
          type: "LineString",
          coordinates: pts.map(p => [p.lng, p.lat])
        }
      }
    });

    map.addLayer({
      id: "flight-line",
      type: "line",
      source: "flight-path",
      layout: { "line-cap": "round", "line-join": "round" },
      paint: {
        "line-color": "#ff0000",
        "line-opacity": 0.95,
        "line-width": ["interpolate", ["linear"], ["zoom"], 10, 2, 12, 4, 14, 6, 16, 10, 18, 14]
      }
    });

    zoomTo(flightBounds);
    requestAnimationFrame(loop);
  });

  function loop(now){
    if (!lastFrame) lastFrame = now;
    const dt = now - lastFrame;
    lastFrame = now;

    if (playing) {
      simElapsed += dt * speed;
      if (simElapsed > duration) {
        simElapsed = duration;
        playing = false;
        playBtn.textContent = "Play";
      }
    }

    const t = t0 + simElapsed;
    let pos = interpolate(t);

    if (FEATURES.kalman) {
      pos = kalmanLike(lastSmoothedPos || pos, pos);
      lastSmoothedPos = pos;
    } else {
      lastSmoothedPos = null;
    }

    const tFuture = Math.min(t0 + duration, t + (TREND_SECONDS * 1000));
    const posFuture = interpolate(tFuture);

    const brg = bearingDeg(pos, posFuture);
    const brgArrow = bearingArrow(brg);

    ghostEl.style.display = (playing && FEATURES.trend) ? "block" : "none";
    if (map.getLayer("trend-line")) {
      map.setLayoutProperty(
        "trend-line",
        "visibility",
        (playing && FEATURES.trend) ? "visible" : "none"
      );
    }

    if (FEATURES.trend) {
      ghost.setLngLat([posFuture.lng, posFuture.lat]);
      const trendSrc = map.getSource("trend");
      if (trendSrc) {
        trendSrc.setData({
          type: "Feature",
          geometry: {
            type: "LineString",
            coordinates: [
              [pos.lng, pos.lat],
              [posFuture.lng, posFuture.lat]
            ]
          }
        });
      }
    }

    let vz = null;
    try {
      const i = Math.min(currentIndex, pts.length - 2);
      const a = pts[i];
      const b = pts[i + 1];
      const dtS = (b.t - a.t) / 1000;
      if (dtS > 0) vz = (b.alt - a.alt) / dtS;
    } catch (e) {
      vz = null;
    }

    aircraft.setLngLat([pos.lng, pos.lat]);

    if (playing) {
      map.easeTo({ center: [pos.lng, pos.lat], duration: 250, easing: x => x });
    }

    const progress = (simElapsed / duration) * 100;

    const c = (pointStatus && pointStatus.length)
      ? pointStatus[Math.min(currentIndex, pointStatus.length - 1)]
      : null;

    if (c) {
      if (c.breach_unknown) aircraftEl.style.background = "#ffbf00";
      else if (c.breach) aircraftEl.style.background = "#ff0000";
      else aircraftEl.style.background = "#00ff00";
    } else {
      aircraftEl.style.background = "#0057ff";
    }

    const zone = c?.zone || null;
    const zoneName = zone?.name || "None";
    const zoneType = zone?.zone_type || "-";
    const status = c?.eval_status || zone?.eval_status || "-";
    const upperM = zone?.upper_m ?? null;
    const lowerM = zone?.lower_m ?? null;

    const altAgl = c?.alt_agl_m ?? null;
    const altAmsl = c?.alt_amsl_m ?? pos.alt;
    const terrainAmsl = (altAgl !== null && altAgl !== undefined)
      ? (Number(altAmsl) - Number(altAgl))
      : null;

    let margin = null;
    let basis = "—";
    if (upperM !== null && upperM !== undefined) {
      if (status.includes("_AGL") && altAgl !== null && altAgl !== undefined) {
        margin = Number(upperM) - Number(altAgl);
        basis = "AGL";
      } else {
        margin = Number(upperM) - Number(altAmsl);
        basis = "AMSL";
      }
    }

    const breachText = (c && c.breach_unknown) ? "UNKNOWN" : (c?.breach ? "BREACH" : "OK");
    const breachColor = (c && c.breach_unknown) ? "#bbbbbb" : (c?.breach ? "#ff0000" : "#00ff00");

    const riskInfo = calculateRisk(margin);
    const marginPct =
      (margin === null || margin === undefined || Number.isNaN(margin))
        ? 0
        : (margin < 0 ? 100 : marginToPct(margin));

    const ttb = predictTtb(margin, vz);

    const zoneFeature = getZoneFeatureById(zone?.id);
    const boundaryPrediction = predictBoundaryEntry(t, zoneFeature, 60, 1);

    let warnText = "";
    let warnClass = "";
    let warnShow = false;

    if (FEATURES.prediction && margin !== null && !Number.isNaN(margin)) {
      if (margin < 0) {
        warnShow = true;
        warnClass = "risk-breach";
        warnText = "BREACH — IMMEDIATE ACTION";
      } else if (ttb !== null && ttb <= 30) {
        warnShow = true;
        warnClass = "risk-warning";
        warnText = `PREDICTED BREACH IN ${Math.round(ttb)}s`;
      } else if (boundaryPrediction) {
        warnShow = true;
        warnClass = "risk-warning";
        warnText = `TRACK ENTRY IN ${Math.round(boundaryPrediction.ttb_s)}s`;
      } else if (margin <= 20) {
        warnShow = true;
        warnClass = "risk-warning";
        warnText = "WARNING — LOW MARGIN";
      } else if (margin <= 50) {
        warnShow = true;
        warnClass = "risk-caution";
        warnText = "CAUTION — MARGIN REDUCING";
      }
    }

    if (FEATURES.prediction && ttb !== null && ttb > 0 && ttb <= 120) {
      const tBreach = Math.min(t0 + duration, t + ttb * 1000);
      const posBreach = interpolate(tBreach);
      breachMarker.setLngLat([posBreach.lng, posBreach.lat]);
      breachEl.style.display = "block";
    } else {
      breachEl.style.display = "none";
    }

    if (FEATURES.prediction && boundaryPrediction) {
      entryMarker.setLngLat([boundaryPrediction.pos.lng, boundaryPrediction.pos.lat]);
      entryEl.style.display = "block";
    } else {
      entryEl.style.display = "none";
    }

    let groundspeed = null;
    if (currentIndex < pts.length - 1) {
      const a = pts[currentIndex];
      const b = pts[currentIndex + 1];
      const dist = distanceM(a, b);
      const dtS = (b.t - a.t) / 1000;
      if (dtS > 0) groundspeed = dist / dtS;
    }

    if (map.getLayer("airspace-3d")) {
      map.setLayoutProperty("airspace-3d", "visibility", FEATURES.cone ? "visible" : "none");
    }

    hud.innerHTML = `
      <div class="hud-header">
        <div class="hud-title">MISSION CONTROL</div>
        <div class="hud-chip ${riskInfo.cls}">
          ${riskInfo.label}
        </div>
      </div>

      <div class="hud-grid">
        <div class="hud-k">TIME</div><div class="hud-v">${new Date(t).toLocaleTimeString()}</div>
        <div class="hud-k">LAT</div><div class="hud-v">${pos.lat.toFixed(5)}</div>
        <div class="hud-k">LON</div><div class="hud-v">${pos.lng.toFixed(5)}</div>
        <div class="hud-k">TRND</div>
        <div class="hud-v">
          ${FEATURES.trend
            ? `<span class="trend-chip"><span class="trend-arrow">${brgArrow}</span> BRG ${brg.toFixed(0)}°  +${TREND_SECONDS}s</span>`
            : "OFF"}
        </div>
        <div class="hud-k">ALT AMSL</div><div class="hud-v">${fmtM(altAmsl)}</div>
        <div class="hud-k">ALT AGL</div><div class="hud-v">${fmtM(altAgl)}</div>
        <div class="hud-k">TERRAIN</div><div class="hud-v">${fmtM(terrainAmsl)}</div>
        <div class="hud-k">V/S</div><div class="hud-v">${vz !== null ? `${vsArrow(vz)} ${vz.toFixed(1)} m/s` : "—"}</div>
        <div class="hud-k">HDG</div><div class="hud-v">${Number.isFinite(brg) ? `${brg.toFixed(0)}°` : "—"}</div>
        <div class="hud-k">GS</div><div class="hud-v">${groundspeed !== null ? `${groundspeed.toFixed(1)} m/s` : "—"}</div>
        <div class="hud-k">SPEED</div><div class="hud-v">${speed}×</div>
        <div class="hud-k">PROGRESS</div><div class="hud-v">${progress.toFixed(1)}%</div>
      </div>

      <div class="hud-divider"></div>

      <div class="hud-grid">
        <div class="hud-k">ZONE</div><div class="hud-v">${zoneName}</div>
        <div class="hud-k">TYPE</div><div class="hud-v">${zoneType}</div>
        <div class="hud-k">STATUS</div><div class="hud-v">${status}</div>
        <div class="hud-k">LIMITS</div><div class="hud-v">${fmtLimit(lowerM)} → ${fmtLimit(upperM)}</div>
        <div class="hud-k">BASIS</div><div class="hud-v">${basis}</div>
        <div class="hud-k">MARGIN</div><div class="hud-v">${margin === null ? "—" : `${margin.toFixed(1)} m`}</div>

        <div class="hud-k">BND</div>
        <div class="hud-v">
          ${zone?.boundary_distance_m === null || zone?.boundary_distance_m === undefined
            ? "—"
            : `${Number(zone.boundary_distance_m).toFixed(1)} m`}
        </div>

        <div class="hud-k">IN/OUT</div>
        <div class="hud-v" style="color:${zone?.inside_zone === true ? '#ffbf00' : '#e8eefc'}">
          ${zone?.inside_zone === true ? "INSIDE" : zone?.inside_zone === false ? "OUTSIDE" : "—"}
        </div>

        <div class="hud-k">HTB</div>
        <div class="hud-v">
          ${boundaryPrediction ? `${Math.round(boundaryPrediction.ttb_s)} s` : "—"}
        </div>

        <div class="hud-k">TRACK</div>
        <div class="hud-v" style="color:${boundaryPrediction ? '#ffbf00' : '#e8eefc'}">
          ${boundaryPrediction ? `ENTRY IN ${Math.round(boundaryPrediction.ttb_s)}s` : "CLEAR"}
        </div>

        <div class="hud-k">TTB</div><div class="hud-v">${FEATURES.prediction && ttb !== null ? `${Math.max(0, Math.round(ttb))} s` : "—"}</div>
        <div class="hud-k">RESULT</div><div class="hud-v" style="color:${breachColor}">${breachText}</div>

        <div class="riskbar">
          <div class="riskbar-fill ${riskInfo.cls} ${margin < 0 ? "breach-flash" : ""}"
               style="width:${marginPct}%"></div>
          <div class="riskbar-tick tick20"></div>
          <div class="riskbar-tick tick50"></div>
          <div class="riskbar-label label20">20m</div>
          <div class="riskbar-label label50">50m</div>
        </div>
      </div>

      <div class="warnstrip ${warnShow ? "show" : ""} ${warnClass}">
        ${warnText}
      </div>
    `;

    slider.value = simElapsed / duration;
    requestAnimationFrame(loop);
  }

  playBtn.onclick = () => {
    playing = !playing;
    playBtn.textContent = playing ? "Pause" : "Play";
  };

  slider.oninput = (e) => {
    simElapsed = e.target.value * duration;
    currentIndex = 0;
    lastSmoothedPos = null;
  };

  speedSel.onchange = () => {
    speed = Number(speedSel.value);
  };

  document.getElementById("feature-toggle").onclick = () => {
    const panel = document.getElementById("feature-panel");
    panel.style.display = panel.style.display === "block" ? "none" : "block";
  };
})();
</script>
</body>
</html>
