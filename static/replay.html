<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>FSMS Flight Replay</title>

  <!-- =========================
     EXTERNAL CSS / ICONS
========================= -->

  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet" />

  <!-- =========================
     PAGE STYLES
========================= -->

  <style>
    html,
    body {
      margin: 0;
      height: 100%;
    }

    #map {
      height: 100%;
    }

    .panel {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 8px 12px;
      border-radius: 6px;
      z-index: 10;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
      font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: 12px;
    }

    #controls {
      bottom: 90px;
    }

    #slider-container {
      bottom: 20px;
    }

    #speed-container {
      bottom: 140px;
    }

    #zoom-container {
      bottom: 190px;
    }

    input[type=range] {
      width: 320px;
    }

    /* ===============================
   Mission Control HUD
================================ */
    #hud {
      position: absolute;
      top: 15px;
      left: 15px;
      background: rgba(10, 12, 16, 0.92);
      color: #e8eefc;
      padding: 14px;
      border-radius: 12px;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: 12px;
      min-width: 330px;
      z-index: 30;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.45);
    }

    .hud-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .hud-title {
      font-size: 11px;
      letter-spacing: 0.12em;
      opacity: 0.8;
    }

    .hud-chip {
      padding: 4px 10px;
      border-radius: 999px;
      font-weight: 800;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .hud-grid {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 6px 10px;
    }

    .hud-k {
      opacity: 0.65;
    }

    .hud-v {
      font-weight: 700;
    }

    .hud-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
      margin: 10px 0;
    }

    /* Risk colours */
    .risk-safe {
      color: #00ff00;
    }

    .risk-caution {
      color: #ffff00;
    }

    .risk-warning {
      color: #ffbf00;
    }

    .risk-breach {
      color: #ff0000;
    }

    .risk-unknown {
      color: #bbbbbb;
    }

    /* Risk bar */
    .riskbar {
      grid-column: 1 / -1;
      position: relative;
      height: 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
      margin-top: 6px;
    }

    .riskbar-fill {
      height: 100%;
      width: 0%;
      transition: width 0.15s linear;
    }

    .riskbar-fill.risk-safe {
      background: #00ff00;
    }

    .riskbar-fill.risk-caution {
      background: #ffff00;
    }

    .riskbar-fill.risk-warning {
      background: #ffbf00;
    }

    .riskbar-fill.risk-breach {
      background: #ff0000;
    }

    .riskbar-fill.risk-unknown {
      background: #bbbbbb;
    }

    .riskbar-label {
      position: absolute;
      top: 14px;
      font-size: 10px;
      opacity: 0.7;
    }

    .label20 {
      left: 20%;
      transform: translateX(-50%);
    }

    .label50 {
      left: 50%;
      transform: translateX(-50%);
    }

    .riskbar-tick {
      position: absolute;
      top: -2px;
      width: 2px;
      height: 16px;
      background: #ffffff66;
    }

    .tick20 {
      left: 20%;
    }

    .tick50 {
      left: 50%;
    }

    .warnstrip {
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      background: rgba(255, 255, 255, 0.05);
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      display: none;
    }

    .warnstrip.show {
      display: block;
    }

    @keyframes breachFlash {
      0% {
        opacity: 1;
      }

      50% {
        opacity: 0.2;
      }

      100% {
        opacity: 1;
      }
    }

    .breach-flash {
      animation: breachFlash 0.6s infinite;
    }

    /* Aircraft marker */
    .aircraft-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #00ff00;
      border: 2px solid #ffffff;
      box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.25);
    }

    /* Trend ghost marker */
    .ghost-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px dashed rgba(255, 255, 255, 0.95);
      background: rgba(255, 255, 255, 0.10);
      box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.25);
    }

    /* Vertical breach prediction marker */
    .breach-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 3px solid #ff0000;
      background: rgba(255, 0, 0, 0.15);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.35);
      animation: breachFlash 0.8s infinite;
    }

    /* Horizontal entry prediction marker */
    .entry-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 3px solid #ffbf00;
      background: rgba(255, 191, 0, 0.18);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.30);
      animation: breachFlash 0.8s infinite;
    }

    /* Trend chip */
    .trend-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      font-weight: 800;
      letter-spacing: 0.06em;
    }

    .trend-arrow {
      font-size: 14px;
      line-height: 1;
    }

    /* Buttons */
    .btn {
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      margin-left: 6px;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn[disabled] {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Feature Toggle Menu */
    #feature-menu {
      position: absolute;
      top: 100px;
      right: 15px;
      z-index: 50;
      font-family: ui-monospace, Menlo, Consolas, monospace;
    }

    #feature-toggle {
      background: white;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
      cursor: pointer;
      font-weight: 700;
    }

    #feature-panel {
      display: none;
      margin-top: 8px;
      background: white;
      padding: 10px 12px;
      border-radius: 8px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
      min-width: 220px;
    }

    #feature-panel label {
      display: block;
      margin: 4px 0;
      font-size: 12px;
    }

    #feature-panel hr {
      border: none;
      border-top: 1px solid #ddd;
      margin: 8px 0;
    }
  </style>
</head>

<body>

  <!-- =========================
     MAP CONTAINER
========================= -->
  <div id="map"></div>

  <div id="speed-container" class="panel">
    Speed:
    <select id="speed">
      <option value="0.25">0.25×</option>

  <div id="zoom-container" class="panel">

  <div id="slider-container" class="panel">

  <!-- =========================
     FEATURE TOGGLES / FILTERS
========================= -->

  <div id="feature-menu">
    <button id="feature-toggle">⚙ Features</button>

    <div id="feature-panel">
      <label><input type="checkbox" id="toggleTrend" checked> Trend Vector</label>

      <div><b>Airspace Filters</b></div>
      <label><input type="checkbox" class="zone-filter" value="controlled" checked> Controlled</label>
      <label><input type="checkbox" class="zone-filter" value="restricted" checked> Restricted</label>
      <label><input type="checkbox" class="zone-filter" value="prohibited" checked> Prohibited</label>

    </div>

  <!-- =========================
     HUD CONTAINER
========================= -->

  <!-- =========================
     MAPLIBRE LIBRARY
========================= -->

  <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
  <!-- =========================
     MAIN REPLAY APP
========================= -->
  <script>
    console.log("STEP 1: SCRIPT LOADED");
    (async () => {

      /* =========================
       CONFIG / ENDPOINTS
    ========================= */

      const flight_id = "3422422e-f6b4-4059-8de4-93145daecddc";
      const API_URL = `http://localhost:5000/api/fsms/replay/${flight_id}`;
      const MAP_KEY = "lxT2mb9w5c89C9E9kziZ";
      const AIRSPACE_URL = `/api/airspace/by-flight/${flight_id}?buffer_m=5000`;
      const COMPLIANCE_URL = `/api/compliance/airspace/by-flight/${flight_id}`;
      const TREND_SECONDS = 10;

      const MAX_PREDICT_DIST = 500;
      const MAX_PREDICT_SECONDS = 60;

      /* =========================
       DOM REFERENCES
    ========================= */

      const slider = document.getElementById("slider");
      const playBtn =
        document.getElementById("play-btn") ||
        document.getElementById("play");
      const speedSel = document.getElementById("speed");
      const hud = document.getElementById("hud");

      /* =========================
         ZOOM BUTTON REFERENCES
      ========================= */

      const zoomFlightBtn = document.getElementById("zoomFlight");
      const zoomAirspaceBtn = document.getElementById("zoomAirspace");
      const zoomBothBtn = document.getElementById("zoomBoth");

      /* =========================
         FEATURE FLAGS
      ========================= */

      const FEATURES = {
        trend: true,
        prediction: true,
        envelope: false,
        cone: false,
        kalman: false,
        vectors: false
      };

      /* =========================
         REPLAY STATE
      ========================= */

      let playing = false;
      let speed = 1;
      let simElapsed = 0;
      let lastFrame = null;
      let currentIndex = 0;
      let flightBounds = null;
      let airspaceBounds = null;
      let airspaceGeojson = null;
      let lastSmoothedPos = null;
      let lastPrediction = null;

      /* =========================
         UI / TOGGLE HELPERS
      ========================= */

      function bindToggle(id, key) {
        const el = document.getElementById(id);
        if (!el) return;
        FEATURES[key] = !!el.checked;
        el.addEventListener("change", (e) => {
          FEATURES[key] = e.target.checked;
        });
      }

      function setupFeatureToggles() {
        bindToggle("toggleTrend", "trend");
        bindToggle("togglePrediction", "prediction");
        bindToggle("toggleCone", "cone");
        bindToggle("toggleKalman", "kalman");
        bindToggle("toggleVectors", "vectors");
      }
      /* =========================
          DISPLAY / FORMAT HELPERS
       ========================= */

      function calculateRisk(marginM) {
        if (marginM === null || marginM === undefined || Number.isNaN(marginM)) {
          return { label: "UNKNOWN", cls: "risk-unknown" };
        }
        if (marginM < 0) return { label: "BREACH", cls: "risk-breach" };
        if (marginM < 20) return { label: "WARNING", cls: "risk-warning" };
        if (marginM < 50) return { label: "CAUTION", cls: "risk-caution" };
        return { label: "SAFE", cls: "risk-safe" };
      }

      function fmtLimit(v) {
        if (v === null || v === undefined) return "—";

        const m = Number(v);

        // detect common 400 ft limit
        if (Math.abs(m - 121.92) < 2) {
          return "120.0 m (400 ft)";
        }

        const ft = m * 3.28084;

        return `${m.toFixed(1)} m (${Math.round(ft)} ft)`;
      }
      function fmtM(v) {
        if (v === null || v === undefined || Number.isNaN(v)) return "—";
        return `${Number(v).toFixed(1)} m`;
      }

      function vsArrow(vz) {
        if (vz === null || vz === undefined || Number.isNaN(vz)) return "—";
        if (vz > 0.15) return "↑";
        if (vz < -0.15) return "↓";
        return "→";
      }

      /* =========================
       GENERIC MATH HELPERS
    ========================= */

      function clamp(n, a, b) {
        return Math.max(a, Math.min(b, n));
      }

      function marginToPct(m) {
        if (m === null || m === undefined || Number.isNaN(m)) return 0;
        return clamp(Number(m), 0, 100);
      }

      function predictTtb(marginM, vzMps) {
        if (marginM === null || marginM === undefined || Number.isNaN(marginM)) return null;
        if (vzMps === null || vzMps === undefined || Number.isNaN(vzMps)) return null;
        if (vzMps <= 0) return null;
        if (marginM <= 0) return 0;
        return marginM / vzMps;
      }

      function predictVerticalConflictTtb(pathPoints, zoneFeature) {
        if (!zoneFeature?.properties || !Array.isArray(pathPoints) || !pathPoints.length) {
          return null;
        }

        const lowerM = zoneFeature?.properties?.lower_m ?? null;
        const upperM = zoneFeature?.properties?.upper_m ?? null;

        for (const p of pathPoints) {
          const verticalOk = isWithinVerticalBand(p.alt, lowerM, upperM);
          if (verticalOk === true) {
            return {
              ttb_s: p.ttb_s,
              alt: p.alt,
              lower_m: lowerM,
              upper_m: upperM
            };
          }
        }

        return null;
      }

      function describeVerticalRelation(predictedAlt, lowerM, upperM) {
        if (predictedAlt === null || predictedAlt === undefined || Number.isNaN(predictedAlt)) {
          return "UNKNOWN";
        }

        if (lowerM !== null && lowerM !== undefined && predictedAlt < Number(lowerM)) {
          return "BELOW FLOOR";
        }

        if (upperM !== null && upperM !== undefined && predictedAlt > Number(upperM)) {
          return "ABOVE CEILING";
        }

        return "INSIDE BAND";
      }

      /* =========================
       GEOMETRY / MOVEMENT HELPERS
    ========================= */

      function bearingDeg(a, b) {
        const toRad = d => d * Math.PI / 180;
        const toDeg = r => r * 180 / Math.PI;
        const lat1 = toRad(a.lat), lat2 = toRad(b.lat);
        const dLon = toRad(b.lng - a.lng);
        const y = Math.sin(dLon) * Math.cos(lat2);
        const x = Math.cos(lat1) * Math.sin(lat2) -
          Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
        let brng = toDeg(Math.atan2(y, x));
        brng = (brng + 360) % 360;
        return brng;
      }

      function bearingArrow(deg) {
        const dirs = ["↑", "↗", "→", "↘", "↓", "↙", "←", "↖"];
        const idx = Math.round(deg / 45) % 8;
        return dirs[idx];
      }

      function kalmanLike(prev, current) {
        const k = 0.2;
        return {
          lat: prev.lat + k * (current.lat - prev.lat),
          lng: prev.lng + k * (current.lng - prev.lng),
          alt: prev.alt + k * (current.alt - prev.alt)
        };
      }

      function distanceM(a, b) {
        const R = 6371000;
        const lat1 = a.lat * Math.PI / 180;
        const lat2 = b.lat * Math.PI / 180;
        const dLat = (b.lat - a.lat) * Math.PI / 180;
        const dLon = (b.lng - a.lng) * Math.PI / 180;
        const x = Math.sin(dLat / 2) ** 2 +
          Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) ** 2;
        return 2 * R * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
      }

      function movePoint(start, headingDeg, distanceM) {
        const R = 6371000;

        const brng = headingDeg * Math.PI / 180;
        const lat1 = start.lat * Math.PI / 180;
        const lon1 = start.lng * Math.PI / 180;

        const lat2 = Math.asin(
          Math.sin(lat1) * Math.cos(distanceM / R) +
          Math.cos(lat1) * Math.sin(distanceM / R) * Math.cos(brng)
        );

        const lon2 = lon1 + Math.atan2(
          Math.sin(brng) * Math.sin(distanceM / R) * Math.cos(lat1),
          Math.cos(distanceM / R) - Math.sin(lat1) * Math.sin(lat2)
        );

        return {
          lat: lat2 * 180 / Math.PI,
          lng: lon2 * 180 / Math.PI
        };
      }

      function normalizeHeading(deg) {
        return ((deg % 360) + 360) % 360;
      }

      function makeArrowHead(endPos, headingDeg, arrowLengthM = 18, arrowAngleDeg = 28) {
        const left = movePoint(
          endPos,
          normalizeHeading(headingDeg + 180 - arrowAngleDeg),
          arrowLengthM
        );

        const right = movePoint(
          endPos,
          normalizeHeading(headingDeg + 180 + arrowAngleDeg),
          arrowLengthM
        );

        return {
          type: "Feature",
          geometry: {
            type: "Polygon",
            coordinates: [[
              [endPos.lng, endPos.lat],
              [left.lng, left.lat],
              [right.lng, right.lat],
              [endPos.lng, endPos.lat]
            ]]
          }
        };
      }

      function buildPredictiveConflictEnvelope(pathPoints, corridorWidthM = 20) {
        if (!Array.isArray(pathPoints) || pathPoints.length < 2) return null;
        if (typeof turf === "undefined") {
          console.warn("Turf.js is required for predictive conflict envelope");
          return null;
        }

        const coords = pathPoints.map(p => [p.lng, p.lat]);
        const line = turf.lineString(coords);

        try {
          return turf.buffer(line, corridorWidthM, { units: "meters" });
        } catch (e) {
          console.warn("Failed to build predictive envelope:", e.message);
          return null;
        }
      }

      function findEnvelopeConflicts(envelopeFeature, airspaceGeojson) {
        if (!envelopeFeature || !airspaceGeojson?.features?.length) return [];
        if (typeof turf === "undefined") {
          console.warn("Turf.js is required for envelope conflict detection");
          return [];
        }

        const conflicts = [];

        for (const feature of airspaceGeojson.features) {
          try {
            const overlap = turf.intersect(
              turf.featureCollection([envelopeFeature, feature])
            );

            if (overlap) {
              conflicts.push({
                zoneId: feature?.properties?.id ?? null,
                zoneName: feature?.properties?.name ?? "Unknown",
                zoneType: feature?.properties?.zone_type ?? "-",
                feature,
                overlap
              });
            }
          } catch (e) {
            console.warn("Envelope conflict test failed:", e.message);
          }
        }

        return conflicts;
      }


      /* =========================
         FUTURE PATH / PREDICTION HELPERS
      ========================= */

      function predictFuturePath(
        currentPos,
        headingDeg,
        groundspeed,
        vz,
        secondsAhead = 60,
        stepSeconds = 1
      ) {
        if (!groundspeed || groundspeed <= 0) return [];

        const adaptiveStep =
          groundspeed > 50 ? 0.25 :
            groundspeed > 25 ? 0.5 :
              stepSeconds;

        const points = [];

        let pos = { lat: currentPos.lat, lng: currentPos.lng };
        let alt = currentPos.alt ?? 0;

        for (let s = adaptiveStep; s <= secondsAhead; s += adaptiveStep) {
          const dist = groundspeed * adaptiveStep;
          pos = movePoint(pos, headingDeg, dist);
          alt = alt + (vz || 0) * adaptiveStep;

          points.push({
            lat: pos.lat,
            lng: pos.lng,
            alt,
            ttb_s: s
          });
        }

        return points;
      }



      // Predict earliest path/airspace intersection using exact segment/polygon
      // intersection where available, with interpolated altitude and time-to-boundary.

      function predictPathIntersection(pathPoints, zoneFeature) {
        if (!zoneFeature?.geometry || !Array.isArray(pathPoints) || pathPoints.length < 2) {
          return null;
        }

        let best = null;

        for (let i = 1; i < pathPoints.length; i++) {
          const p0 = pathPoints[i - 1];
          const p1 = pathPoints[i];

          const inside0 = pointInPolygon(p0, zoneFeature.geometry);
          const inside1 = pointInPolygon(p1, zoneFeature.geometry);

          // If already inside at p1, keep p1 as fallback
          if (inside1 && !best) {
            best = {
              lng: p1.lng,
              lat: p1.lat,
              alt: p1.alt,
              ttb_s: p1.ttb_s
            };
          }

          // Exact boundary crossing from outside to inside
          if (!inside0 && inside1) {
            const seg = turf.lineString([
              [p0.lng, p0.lat],
              [p1.lng, p1.lat]
            ]);

            let poly;
            if (zoneFeature.geometry.type === "Polygon") {
              poly = turf.polygon(zoneFeature.geometry.coordinates);
            } else if (zoneFeature.geometry.type === "MultiPolygon") {
              poly = turf.multiPolygon(zoneFeature.geometry.coordinates);
            } else {
              continue;
            }

            const hits = turf.lineIntersect(seg, poly);

            if (hits?.features?.length) {
              const hit = hits.features[0];
              const [hitLng, hitLat] = hit.geometry.coordinates;

              const segDx = p1.lng - p0.lng;
              const segDy = p1.lat - p0.lat;

              let frac = 0.5;
              if (Math.abs(segDx) >= Math.abs(segDy) && segDx !== 0) {
                frac = (hitLng - p0.lng) / segDx;
              } else if (segDy !== 0) {
                frac = (hitLat - p0.lat) / segDy;
              }

              frac = Math.max(0, Math.min(1, frac));

              return {
                lng: hitLng,
                lat: hitLat,
                alt: p0.alt + (p1.alt - p0.alt) * frac,
                ttb_s: p0.ttb_s + (p1.ttb_s - p0.ttb_s) * frac
              };
            }

            // Fallback if exact intersection is unavailable
            return {
              lng: p0.lng + (p1.lng - p0.lng) * 0.5,
              lat: p0.lat + (p1.lat - p0.lat) * 0.5,
              alt: p0.alt + (p1.alt - p0.alt) * 0.5,
              ttb_s: p0.ttb_s + (p1.ttb_s - p0.ttb_s) * 0.5
            };
          }
        }

        return best;
      }

      /* =========================
         POLYGON / ZONE HELPERS
      ========================= */

      function pointInRing(point, ring) {
        const x = point.lng;
        const y = point.lat;
        let inside = false;

        for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
          const xi = ring[i][0], yi = ring[i][1];
          const xj = ring[j][0], yj = ring[j][1];

          const intersect =
            ((yi > y) !== (yj > y)) &&
            (x < ((xj - xi) * (y - yi)) / ((yj - yi) || 1e-12) + xi);

          if (intersect) inside = !inside;
        }

        return inside;
      }

      function pointInPolygon(point, geometry) {
        if (!geometry) return false;

        if (geometry.type === "Polygon") {
          return pointInRing(point, geometry.coordinates[0]);
        }

        if (geometry.type === "MultiPolygon") {
          return geometry.coordinates.some(poly => pointInRing(point, poly[0]));
        }

        return false;
      }
      function predictEarliestZoneEntry(pathPoints, airspaceGeojson) {
        if (!airspaceGeojson?.features?.length) return null;

        let best = null;

        for (const feature of airspaceGeojson.features) {

          const hit = predictPathIntersection(pathPoints, feature);
          if (!hit) continue;

          const candidate = {
            zoneId: feature?.properties?.id ?? null,
            zoneName: feature?.properties?.name ?? "Unknown",
            zoneType: feature?.properties?.zone_type ?? "-",
            pos: { lng: hit.lng, lat: hit.lat },
            ttb_s: hit.ttb_s,
            alt: hit.alt
          };

          if (!best || candidate.ttb_s < best.ttb_s) {
            best = candidate;
          }

        }

        return best;
      }


      function segmentIntersection(p1, p2, q1, q2) {
        const x1 = p1.lng, y1 = p1.lat;
        const x2 = p2.lng, y2 = p2.lat;
        const x3 = q1[0], y3 = q1[1];
        const x4 = q2[0], y4 = q2[1];

        const denom = (x1 - x2) * (y3 - y4) - (y1 - y2) * (x3 - x4);

        if (Math.abs(denom) < 1e-12) return null;

        const t = ((x1 - x3) * (y3 - y4) - (y1 - y3) * (x3 - x4)) / denom;
        const u = ((x1 - x3) * (y1 - y2) - (y1 - y3) * (x1 - x2)) / denom;

        if (t < 0 || t > 1 || u < 0 || u > 1) return null;

        return {
          lng: x1 + t * (x2 - x1),
          lat: y1 + t * (y2 - y1),
          t_line: t
        };
      }

      function getPolygonOuterRings(geometry) {
        if (!geometry) return [];

        if (geometry.type === "Polygon") {
          return [geometry.coordinates[0]];
        }

        if (geometry.type === "MultiPolygon") {
          return geometry.coordinates.map(poly => poly[0]);
        }

        return [];
      }

      function predictBoundaryIntersection(currentPos, futurePos, zoneFeature, groundspeed) {
        if (!zoneFeature?.geometry) return null;
        if (!groundspeed || groundspeed <= 0) return null;

        const startInside = pointInPolygon(currentPos, zoneFeature.geometry);

        const rings = getPolygonOuterRings(zoneFeature.geometry);

        let bestHit = null;

        for (const ring of rings) {
          for (let i = 0; i < ring.length - 1; i++) {
            const q1 = ring[i];
            const q2 = ring[i + 1];

            const hit = segmentIntersection(currentPos, futurePos, q1, q2);
            if (!hit) continue;

            if (!bestHit || hit.t_line < bestHit.t_line) {
              bestHit = hit;
            }
          }
        }

        if (!bestHit) return null;

        const totalDistM = distanceM(currentPos, futurePos);
        const distToHitM = totalDistM * bestHit.t_line;
        const ttb_s = distToHitM / groundspeed;

        return {
          pos: {
            lng: bestHit.lng,
            lat: bestHit.lat
          },
          distance_m: distToHitM,
          ttb_s: ttb_s
        };
      }

      /* =========================
         ALTITUDE / 4D CONFLICT HELPERS
      ========================= */

      function predictAltAtTime(currentAlt, vzMps, dtSeconds) {
        if (currentAlt === null || currentAlt === undefined || Number.isNaN(currentAlt)) return null;
        if (vzMps === null || vzMps === undefined || Number.isNaN(vzMps)) return null;
        return Number(currentAlt) + Number(vzMps) * Number(dtSeconds);
      }

      function isWithinVerticalBand(predictedAlt, lowerM, upperM) {
        if (predictedAlt === null || predictedAlt === undefined || Number.isNaN(predictedAlt)) return null;

        if (lowerM !== null && lowerM !== undefined && predictedAlt < Number(lowerM)) {
          return false;
        }

        if (upperM !== null && upperM !== undefined && predictedAlt > Number(upperM)) {
          return false;
        }

        return true;
      }

      function predict4DConflict(currentPos, futurePos, zoneFeature, groundspeed, currentAlt, vzMps, lowerM, upperM) {
        const boundaryHit = predictBoundaryIntersection(currentPos, futurePos, zoneFeature, groundspeed);
        if (!boundaryHit) return null;

        const predictedAltAtEntry = predictAltAtTime(currentAlt, vzMps, boundaryHit.ttb_s);
        const verticalOk = isWithinVerticalBand(predictedAltAtEntry, lowerM, upperM);

        return {
          pos: boundaryHit.pos,
          distance_m: boundaryHit.distance_m,
          ttb_s: boundaryHit.ttb_s,
          predicted_alt_m: predictedAltAtEntry,
          vertical_ok: verticalOk,
          conflict: verticalOk === false
        };
      }

      function predictEarliest4DConflict(pathPoints, airspaceGeojson) {
        if (!airspaceGeojson?.features?.length) return null;

        let bestConflict = null;
        let bestLateralOnly = null;

        for (const feature of airspaceGeojson.features) {
          const hit = predictPathIntersection(pathPoints, feature);
          if (!hit) continue;

          const lowerM = feature?.properties?.lower_m ?? null;
          const upperM = feature?.properties?.upper_m ?? null;

          const verticalOk = isWithinVerticalBand(hit.alt, lowerM, upperM);
          const verticalKnown = verticalOk !== null;
          const isConflict = verticalOk === true;

          const candidate = {
            zoneId: feature?.properties?.id ?? null,
            zoneName: feature?.properties?.name ?? "Unknown",
            zoneType: feature?.properties?.zone_type ?? "-",
            pos: { lng: hit.lng, lat: hit.lat },
            ttb_s: hit.ttb_s,
            predicted_alt_m: hit.alt,
            lower_m: lowerM,
            upper_m: upperM,
            vertical_ok: verticalOk,
            vertical_known: verticalKnown,
            conflict: isConflict
          };

          if (isConflict) {
            if (!bestConflict || candidate.ttb_s < bestConflict.ttb_s) {
              bestConflict = candidate;
            }
          } else {
            if (!bestLateralOnly || candidate.ttb_s < bestLateralOnly.ttb_s) {
              bestLateralOnly = candidate;
            }
          }
        }

        return bestConflict || bestLateralOnly;
      }

          for (const poly of g.coordinates) for (const ring of poly) for (const coord of ring) b.extend(coord);

    slider.value = simElapsed / duration;
  }

  requestAnimationFrame(loop);
}

if (playBtn) {
  playBtn.onclick = () => {
    playing = !playing;
    playBtn.textContent = playing ? "Pause" : "Play";
    if (playing) {
      lastFrame = null;
      requestAnimationFrame(loop);
    }
  };
}

if (slider) {
  slider.oninput = (e) => {
    simElapsed = Number(e.target.value) * duration;
    currentIndex = 0;
    lastSmoothedPos = null;
  };
}

if (speedSel) {
  speedSel.onchange = () => {
    speed = Number(speedSel.value) || 1;
  };
}

const featureToggleBtn = document.getElementById("feature-toggle");
if (featureToggleBtn) {
  featureToggleBtn.onclick = () => {
    const panel = document.getElementById("feature-panel");
    if (panel) {
      panel.style.display = panel.style.display === "block" ? "none" : "block";
    }
  };
}

})();
</script>
</body>

</html>
