<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FSMS Flight Replay</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
  <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet" />

  <style>
    html, body {
      margin: 0;
      height: 100%;
    }

    #map {
      height: 100%;
    }

    .panel {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 8px 12px;
      border-radius: 6px;
      z-index: 10;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
      font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: 12px;
    }

    #controls { bottom: 90px; }
    #slider-container { bottom: 20px; }
    #speed-container { bottom: 140px; }
    #zoom-container { bottom: 190px; }

    input[type="range"] {
      width: 320px;
    }

  #hud {
  position: absolute;
  top: 15px;
  left: 15px;
  background: rgba(10, 12, 16, 0.92);
  color: #e8eefc;
  padding: 14px;
  border-radius: 12px;
  font-family: ui-monospace, Menlo, Consolas, monospace;
  font-size: 12px;
  min-width: 420px;
  max-width: 520px;
  z-index: 30;
  border: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow: 0 18px 45px rgba(0, 0, 0, 0.45);
}

    .hud-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .hud-title {
      font-size: 11px;
      letter-spacing: 0.12em;
      opacity: 0.8;
    }

    .hud-chip {
      padding: 4px 10px;
      border-radius: 999px;
      font-weight: 800;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .hud-grid {
  display: grid;
  grid-template-columns: 140px 1fr;
  gap: 6px 10px;
}

    .hud-k { opacity: 0.65; }
    .hud-v { font-weight: 700; }

    .hud-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
      margin: 10px 0;
    }

    .hud-section-title {
  font-size: 13px;
  opacity: 0.9;
  margin-bottom: 8px;
}

/* STATUS COLORS */

.hud-status-ok {
  color: #00ff88;
}

.hud-status-caution {
  color: #ffbf00;
}

.hud-status-warning {
  color: #ff8800;
}

.hud-status-critical {
  color: #ff3b3b;
  font-weight: 600;
}

/* ACTIVE STATE */

.hud-status-active {
  color: #00ffcc;
}

.hud-status-inactive {
  color: #888;
}

    .risk-caution { color: #eab308; }
    .risk-warning { color: #f97316; }
    .risk-breach { color: #ef4444; }
    .risk-ok { color: #22c55e; font-weight: 700; }

    .risk-bar-wrap {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.12);
      margin: 8px 0 10px 0;
    }

    .risk-bar-fill {
      height: 100%;
      width: 0%;
      transition: width 0.2s ease;
    }

    .risk-fill-safe { background: #22c55e; }
    .risk-fill-caution { background: #eab308; }
    .risk-fill-warning { background: #f97316; }
    .risk-fill-critical { background: #ef4444; }

    .warnstrip {
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      background: rgba(255, 255, 255, 0.05);
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      display: none;
    }

    .warnstrip.show {
      display: block;
    }

    @keyframes breachFlash {
      0% { opacity: 1; }
      50% { opacity: 0.2; }
      100% { opacity: 1; }
    }

    .aircraft-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #00ff00;
      border: 2px solid #ffffff;
      box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.25);
    }

    .ghost-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px dashed rgba(255, 255, 255, 0.95);
      background: rgba(255, 255, 255, 0.10);
      box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.25);
    }

    .breach-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 3px solid #ff0000;
      background: rgba(255, 0, 0, 0.15);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.35);
      animation: breachFlash 0.8s infinite;
    }

    .entry-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 3px solid #ffbf00;
      background: rgba(255, 191, 0, 0.18);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.30);
      animation: breachFlash 0.8s infinite;
    }

    .btn {
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      margin-left: 6px;
    }

    .btn:active { transform: translateY(1px); }
    .btn[disabled] { opacity: 0.5; cursor: not-allowed; }

    #feature-menu {
      position: absolute;
      top: 100px;
      right: 15px;
      z-index: 50;
      font-family: ui-monospace, Menlo, Consolas, monospace;
    }

    #feature-toggle {
      background: white;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
      cursor: pointer;
      font-weight: 700;
    }

    #feature-panel {
      display: none;
      margin-top: 8px;
      background: white;
      padding: 10px 12px;
      border-radius: 8px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
      min-width: 220px;
    }

    #feature-panel label {
      display: block;
      margin: 4px 0;
      font-size: 12px;
    }

    #feature-panel hr {
      border: none;
      border-top: 1px solid #ddd;
      margin: 8px 0;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <div id="speed-container" class="panel">
    Speed:
    <select id="speed">
      <option value="0.25">0.25×</option>
      <option value="0.5">0.5×</option>
      <option value="1" selected>1×</option>
      <option value="2">2×</option>
      <option value="5">5×</option>
    </select>
  </div>

  <div id="zoom-container" class="panel">
    <button id="zoomFlight" class="btn">Flight</button>
    <button id="zoomAirspace" class="btn" disabled>Airspace</button>
    <button id="zoomBoth" class="btn" disabled>Both</button>
  </div>

  <div id="controls" class="panel">
    <button id="play">Play</button>
  </div>

  <div id="slider-container" class="panel">
    <input id="slider" type="range" min="0" max="1" step="0.0001" value="0" />
  </div>

  <div id="feature-menu">
    <button id="feature-toggle">⚙ Features</button>
    <div id="feature-panel">
      <label><input type="checkbox" id="toggleTrend" checked /> Trend Vector</label>
      <label><input type="checkbox" id="togglePrediction" checked /> Breach Predictor</label>
      <label><input type="checkbox" id="toggleEnvelope" /> Predictive Envelope</label>
      <label><input type="checkbox" id="toggleCone" /> 3D Zones</label>
      <label><input type="checkbox" id="toggleKalman" /> Smooth Track</label>
      <label><input type="checkbox" id="toggleVectors" /> Heading / Speed Overlay</label>

      <hr />
      <div><b>Airspace Filters</b></div>
      <label><input type="checkbox" class="zone-filter" value="controlled" checked /> Controlled</label>
      <label><input type="checkbox" class="zone-filter" value="restricted" checked /> Restricted</label>
      <label><input type="checkbox" class="zone-filter" value="prohibited" checked /> Prohibited</label>
      <label><input type="checkbox" class="zone-filter" value="danger" checked /> Danger</label>
    </div>
  </div>

  <div id="hud"></div>

  <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

  <script>
    (async () => {
      const flight_id = "3422422e-f6b4-4059-8de4-93145daecddc";
      const API_URL = `http://localhost:5000/api/fsms/replay/${flight_id}`;
      const AIRSPACE_URL = `/api/airspace/by-flight/${flight_id}?buffer_m=5000`;
      const COMPLIANCE_URL = `/api/compliance/airspace/by-flight/${flight_id}`;
      const MAP_KEY = "lxT2mb9w5c89C9E9kziZ";

      const TREND_SECONDS = 10;
      const MAX_PREDICT_DIST = 500;
      const MAX_PREDICT_SECONDS = 60;

      const slider = document.getElementById("slider");
      const playBtn = document.getElementById("play");
      const speedSel = document.getElementById("speed");
      const hud = document.getElementById("hud");
      const zoomFlightBtn = document.getElementById("zoomFlight");
      const zoomAirspaceBtn = document.getElementById("zoomAirspace");
      const zoomBothBtn = document.getElementById("zoomBoth");

      
      const FEATURES = {
        trend: true,
        prediction: true,
        envelope: false,
        cone: false,
        kalman: false,
        vectors: false
      };

      let playing = false;
      let speed = 1;
      let simElapsed = 0;
      let lastFrame = null;
      let currentIndex = 0;
      let flightBounds = null;
      let airspaceBounds = null;
      let airspaceGeojson = null;
      let lastSmoothedPos = null;
      let lastPrediction = null;
      
      let lastRiskLabel = null;
      let lastRiskTransitionTs = null;
      let smoothedRiskScore = 0;
      let lastDisplayedRiskScore = 0;

      let lastStableAdvisory = {
        level: "INFO",
        text: "NO ACTION REQUIRED",
        cls: "risk-ok",
        actionChoice: null,
        priorityScore: 0
      };

      let pendingAdvisoryTs = 0;
      let pendingAdvisory = null;
      let lastStableAdvisoryTs = 0;

      let eventSeq = 0;

    const flightEventLog = [];

      let lastEventState = {
        riskLabel: null,
        advisoryKey: null,
        boundaryActive: false,
        conflict4DActive: false,
        envelopeActive: false,
        ttbBands: {
          le20: false,
          le10: false,
          le5: false,
          le2: false
        }
      };

window.flightEventLog = flightEventLog;

      function bindToggle(id, key) {
        const el = document.getElementById(id);
        if (!el) return;
        FEATURES[key] = !!el.checked;
        el.addEventListener("change", (e) => {
          FEATURES[key] = e.target.checked;
        });
      }

      function setupFeatureToggles() {
        bindToggle("toggleTrend", "trend");
        bindToggle("togglePrediction", "prediction");
        bindToggle("toggleEnvelope", "envelope");
        bindToggle("toggleCone", "cone");
        bindToggle("toggleKalman", "kalman");
        bindToggle("toggleVectors", "vectors");
      }

      function clamp(n, a, b) {
        return Math.max(a, Math.min(b, n));
      }

      function clamp01(v) {
        return Math.max(0, Math.min(1, v));
      }

      function sigmoid(x, center, width) {
        if (!Number.isFinite(x)) return 0;
        return 1 / (1 + Math.exp((x - center) / width));
      }

      function marginToPct(m) {
        if (m === null || m === undefined || Number.isNaN(m)) return 0;
        return clamp(Number(m), 0, 100);
      }

      function fmtLimit(v) {
        if (v === null || v === undefined) return "—";
        const m = Number(v);
        if (Math.abs(m - 121.92) < 2) return "120.0 m (400 ft)";
        const ft = m * 3.28084;
        return `${m.toFixed(1)} m (${Math.round(ft)} ft)`;
      }

      function fmtM(v) {
        if (v === null || v === undefined || Number.isNaN(v)) return "—";
        return `${Number(v).toFixed(1)} m`;
      }

      function vsArrow(vz) {
        if (vz === null || vz === undefined || Number.isNaN(vz)) return "—";
        if (vz > 0.15) return "↑";
        if (vz < -0.15) return "↓";
        return "→";
      }

      function bearingDeg(a, b) {
        const toRad = (d) => d * Math.PI / 180;
        const toDeg = (r) => r * 180 / Math.PI;
        const lat1 = toRad(a.lat);
        const lat2 = toRad(b.lat);
        const dLon = toRad(b.lng - a.lng);
        const y = Math.sin(dLon) * Math.cos(lat2);
        const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
        let brng = toDeg(Math.atan2(y, x));
        return (brng + 360) % 360;
      }

      function normalizeAngle180(deg) {
        return ((deg + 180) % 360 + 360) % 360 - 180;
      }

      function computeTurnBias({ brg, zoneBearing }) {
        if (!Number.isFinite(brg) || !Number.isFinite(zoneBearing)) {
          return { turn: "NONE", delta: null };
        }

        const delta = normalizeAngle180(zoneBearing - brg);

        if (delta > 5) return { turn: "LEFT", delta };
        if (delta < -5) return { turn: "RIGHT", delta };
        return { turn: "NONE", delta };
      }

      function kalmanLike(prev, current) {
        const k = 0.2;
        return {
          lat: prev.lat + k * (current.lat - prev.lat),
          lng: prev.lng + k * (current.lng - prev.lng),
          alt: prev.alt + k * (current.alt - prev.alt)
        };
      }

      function distanceM(a, b) {
        const R = 6371000;
        const lat1 = a.lat * Math.PI / 180;
        const lat2 = b.lat * Math.PI / 180;
        const dLat = (b.lat - a.lat) * Math.PI / 180;
        const dLon = (b.lng - a.lng) * Math.PI / 180;
        const x =
          Math.sin(dLat / 2) ** 2 +
          Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) ** 2;
        return 2 * R * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
      }

      function movePoint(start, headingDeg, distanceMVal) {
        const R = 6371000;
        const brng = headingDeg * Math.PI / 180;
        const lat1 = start.lat * Math.PI / 180;
        const lon1 = start.lng * Math.PI / 180;

        const lat2 = Math.asin(
          Math.sin(lat1) * Math.cos(distanceMVal / R) +
          Math.cos(lat1) * Math.sin(distanceMVal / R) * Math.cos(brng)
        );

        const lon2 = lon1 + Math.atan2(
          Math.sin(brng) * Math.sin(distanceMVal / R) * Math.cos(lat1),
          Math.cos(distanceMVal / R) - Math.sin(lat1) * Math.sin(lat2)
        );

        return {
          lat: lat2 * 180 / Math.PI,
          lng: lon2 * 180 / Math.PI
        };
      }

      function normalizeHeading(deg) {
        return ((deg % 360) + 360) % 360;
      }

      function makeArrowHead(endPos, headingDeg, arrowLengthM = 18, arrowAngleDeg = 28) {
        const left = movePoint(endPos, normalizeHeading(headingDeg + 180 - arrowAngleDeg), arrowLengthM);
        const right = movePoint(endPos, normalizeHeading(headingDeg + 180 + arrowAngleDeg), arrowLengthM);

        return {
          type: "Feature",
          geometry: {
            type: "Polygon",
            coordinates: [[
              [endPos.lng, endPos.lat],
              [left.lng, left.lat],
              [right.lng, right.lat],
              [endPos.lng, endPos.lat]
            ]]
          }
        };
      }

      function pointInRing(point, ring) {
        const x = point.lng;
        const y = point.lat;
        let inside = false;

        for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
          const xi = ring[i][0], yi = ring[i][1];
          const xj = ring[j][0], yj = ring[j][1];
          const intersect =
            ((yi > y) !== (yj > y)) &&
            (x < ((xj - xi) * (y - yi)) / ((yj - yi) || 1e-12) + xi);

          if (intersect) inside = !inside;
        }

        return inside;
      }

      function pointInPolygon(point, geometry) {
        if (!geometry) return false;
        if (geometry.type === "Polygon") return pointInRing(point, geometry.coordinates[0]);
        if (geometry.type === "MultiPolygon") return geometry.coordinates.some((poly) => pointInRing(point, poly[0]));
        return false;
      }

      function predictFuturePath(currentPos, headingDeg, groundspeedVal, vz, secondsAhead = 60, stepSeconds = 1) {
        if (!groundspeedVal || groundspeedVal <= 0) return [];

        const adaptiveStep =
          groundspeedVal > 50 ? 0.25 :
          groundspeedVal > 25 ? 0.5 :
          stepSeconds;

        const points = [];
        let pos = { lat: currentPos.lat, lng: currentPos.lng };
        let alt = currentPos.alt ?? 0;

        for (let s = adaptiveStep; s <= secondsAhead; s += adaptiveStep) {
          const dist = groundspeedVal * adaptiveStep;
          pos = movePoint(pos, headingDeg, dist);
          alt = alt + (vz || 0) * adaptiveStep;
          points.push({ lat: pos.lat, lng: pos.lng, alt, ttb_s: s });
        }

        return points;
      }

      function predictPathIntersection(pathPoints, zoneFeature) {
        if (!zoneFeature?.geometry || !Array.isArray(pathPoints) || pathPoints.length < 2) return null;

        let best = null;

        for (let i = 1; i < pathPoints.length; i++) {
          const p0 = pathPoints[i - 1];
          const p1 = pathPoints[i];
          const inside0 = pointInPolygon(p0, zoneFeature.geometry);
          const inside1 = pointInPolygon(p1, zoneFeature.geometry);

          if (inside1 && !best) {
            best = { lng: p1.lng, lat: p1.lat, alt: p1.alt, ttb_s: p1.ttb_s };
          }

          if (!inside0 && inside1) {
            const seg = turf.lineString([[p0.lng, p0.lat], [p1.lng, p1.lat]]);
            let poly;

            if (zoneFeature.geometry.type === "Polygon") {
              poly = turf.polygon(zoneFeature.geometry.coordinates);
            } else if (zoneFeature.geometry.type === "MultiPolygon") {
              poly = turf.multiPolygon(zoneFeature.geometry.coordinates);
            } else {
              continue;
            }

            const hits = turf.lineIntersect(seg, poly);

            if (hits?.features?.length) {
              const hit = hits.features[0];
              const [hitLng, hitLat] = hit.geometry.coordinates;
              const segDx = p1.lng - p0.lng;
              const segDy = p1.lat - p0.lat;

              let frac = 0.5;
              if (Math.abs(segDx) >= Math.abs(segDy) && segDx !== 0) {
                frac = (hitLng - p0.lng) / segDx;
              } else if (segDy !== 0) {
                frac = (hitLat - p0.lat) / segDy;
              }

              frac = Math.max(0, Math.min(1, frac));

              return {
                lng: hitLng,
                lat: hitLat,
                alt: p0.alt + (p1.alt - p0.alt) * frac,
                ttb_s: p0.ttb_s + (p1.ttb_s - p0.ttb_s) * frac
              };
            }

            return {
              lng: p0.lng + (p1.lng - p0.lng) * 0.5,
              lat: p0.lat + (p1.lat - p0.lat) * 0.5,
              alt: p0.alt + (p1.alt - p0.alt) * 0.5,
              ttb_s: p0.ttb_s + (p1.ttb_s - p0.ttb_s) * 0.5
            };
          }
        }

        return best;
      }

      function predictEarliestZoneEntry(pathPoints, airspaceGeojson) {
        if (!airspaceGeojson?.features?.length) return null;

        let best = null;

        for (const feature of airspaceGeojson.features) {
          const hit = predictPathIntersection(pathPoints, feature);
          if (!hit) continue;

          const candidate = {
            zoneId: feature?.properties?.id ?? null,
            zoneName: feature?.properties?.name ?? "Unknown",
            zoneType: feature?.properties?.zone_type ?? "-",
            pos: { lng: hit.lng, lat: hit.lat },
            ttb_s: hit.ttb_s,
            alt: hit.alt
          };

          if (!best || candidate.ttb_s < best.ttb_s) best = candidate;
        }

        return best;
      }

      function isWithinVerticalBand(predictedAlt, lowerM, upperM) {
        if (predictedAlt === null || predictedAlt === undefined || Number.isNaN(predictedAlt)) return null;
        if (lowerM !== null && lowerM !== undefined && predictedAlt < Number(lowerM)) return false;
        if (upperM !== null && upperM !== undefined && predictedAlt > Number(upperM)) return false;
        return true;
      }

      function describeVerticalRelation(predictedAlt, lowerM, upperM) {
        if (predictedAlt === null || predictedAlt === undefined || Number.isNaN(predictedAlt)) return "UNKNOWN";
        if (lowerM !== null && lowerM !== undefined && predictedAlt < Number(lowerM)) return "BELOW FLOOR";
        if (upperM !== null && upperM !== undefined && predictedAlt > Number(upperM)) return "ABOVE CEILING";
        return "INSIDE BAND";
      }

      function predictVerticalConflictTtb(pathPoints, zoneFeature) {
        if (!zoneFeature?.properties || !Array.isArray(pathPoints) || !pathPoints.length) return null;

        const lowerM = zoneFeature?.properties?.lower_m ?? null;
        const upperM = zoneFeature?.properties?.upper_m ?? null;

        for (const p of pathPoints) {
          const verticalOk = isWithinVerticalBand(p.alt, lowerM, upperM);
          if (verticalOk === true) {
            return { ttb_s: p.ttb_s, alt: p.alt, lower_m: lowerM, upper_m: upperM };
          }
        }

        return null;
      }

      function predictEarliest4DConflict(pathPoints, airspaceGeojson) {
        if (!airspaceGeojson?.features?.length) return null;

        let bestConflict = null;
        let bestLateralOnly = null;

        for (const feature of airspaceGeojson.features) {
          const hit = predictPathIntersection(pathPoints, feature);
          if (!hit) continue;

          const lowerM = feature?.properties?.lower_m ?? null;
          const upperM = feature?.properties?.upper_m ?? null;
          const verticalOk = isWithinVerticalBand(hit.alt, lowerM, upperM);
          const verticalKnown = verticalOk !== null;
          const isConflict = verticalOk === true;

          const candidate = {
            zoneId: feature?.properties?.id ?? null,
            zoneName: feature?.properties?.name ?? "Unknown",
            zoneType: feature?.properties?.zone_type ?? "-",
            pos: { lng: hit.lng, lat: hit.lat },
            ttb_s: hit.ttb_s,
            predicted_alt_m: hit.alt,
            lower_m: lowerM,
            upper_m: upperM,
            vertical_ok: verticalOk,
            vertical_known: verticalKnown,
            conflict: isConflict
          };

          if (isConflict) {
            if (!bestConflict || candidate.ttb_s < bestConflict.ttb_s) bestConflict = candidate;
          } else {
            if (!bestLateralOnly || candidate.ttb_s < bestLateralOnly.ttb_s) bestLateralOnly = candidate;
          }
        }

        return bestConflict || bestLateralOnly;
      }

      function smoothPrediction(newPrediction) {
        if (!newPrediction) return lastPrediction;
        if (!lastPrediction) {
          lastPrediction = newPrediction;
          return newPrediction;
        }
        const dt = Math.abs(newPrediction.ttb_s - lastPrediction.ttb_s);
        if (dt < 0.5) return lastPrediction;
        lastPrediction = newPrediction;
        return newPrediction;
      }

      function buildPredictiveConflictEnvelope(pathPoints, corridorWidthM = 20) {
        if (!Array.isArray(pathPoints) || pathPoints.length < 2) return null;
        if (typeof turf === "undefined") return null;

        const coords = pathPoints.map((p) => [p.lng, p.lat]);
        const line = turf.lineString(coords);

        try {
          return turf.buffer(line, corridorWidthM, { units: "meters" });
        } catch (e) {
          console.warn("Failed to build predictive envelope:", e.message);
          return null;
        }
      }

      function findEnvelopeConflicts(envelopeFeature, airspaceGeojson) {
        if (!envelopeFeature || !airspaceGeojson?.features?.length) return [];
        if (typeof turf === "undefined") return [];

        const conflicts = [];

        for (const feature of airspaceGeojson.features) {
          try {
            const overlap = turf.intersect(turf.featureCollection([envelopeFeature, feature]));
            if (overlap) {
              conflicts.push({
                zoneId: feature?.properties?.id ?? null,
                zoneName: feature?.properties?.name ?? "Unknown",
                zoneType: feature?.properties?.zone_type ?? "-",
                overlap
              });
            }
          } catch (e) {
            console.warn("Envelope conflict test failed:", e.message);
          }
        }

        return conflicts;
      }

      function predictTtb(marginM, vzMps) {
        if (marginM === null || marginM === undefined || Number.isNaN(marginM)) return null;
        if (vzMps === null || vzMps === undefined || Number.isNaN(vzMps)) return null;
        if (vzMps <= 0) return null;
        if (marginM <= 0) return 0;
        return marginM / vzMps;
      }

      function computeRiskLevel(score) {
        if (score >= 82) return { label: "CRITICAL", cls: "risk-breach" };
        if (score >= 58) return { label: "WARNING", cls: "risk-warning" };
        if (score >= 28) return { label: "CAUTION", cls: "risk-caution" };
        return { label: "SAFE", cls: "risk-ok" };
      }

      function normalizeZoneType(zoneType) {
        return String(zoneType || "").trim().toUpperCase();
      }

      function zoneSeverityProfile(zoneType) {
        const z = normalizeZoneType(zoneType);

        if (z.includes("PROHIBITED")) {
          return {
            class: "PROHIBITED",
            riskMultiplier: 1.45,
            advisoryBias: 26,
            cautionTtb: 90,
            warningTtb: 45,
            immediateTtb: 18
          };
        }

        if (z.includes("RESTRICTED")) {
          return {
            class: "RESTRICTED",
            riskMultiplier: 1.28,
            advisoryBias: 18,
            cautionTtb: 75,
            warningTtb: 35,
            immediateTtb: 15
          };
        }

        if (z.includes("DANGER")) {
          return {
            class: "DANGER",
            riskMultiplier: 1.18,
            advisoryBias: 12,
            cautionTtb: 60,
            warningTtb: 28,
            immediateTtb: 12
          };
        }

        if (z.includes("CTR")) {
          return {
            class: "CTR",
            riskMultiplier: 1.08,
            advisoryBias: 8,
            cautionTtb: 60,
            warningTtb: 25,
            immediateTtb: 10
          };
        }

        if (z.includes("CONTROLLED") || z.includes("CTA") || z.includes("TMA")) {
          return {
            class: "CONTROLLED",
            riskMultiplier: 1.0,
            advisoryBias: 5,
            cautionTtb: 55,
            warningTtb: 22,
            immediateTtb: 9
          };
        }

        if (z.includes("RMZ") || z.includes("TMZ")) {
          return {
            class: "RMZ/TMZ",
            riskMultiplier: 0.88,
            advisoryBias: 1,
            cautionTtb: 45,
            warningTtb: 18,
            immediateTtb: 8
          };
        }

        return {
          class: "OTHER",
          riskMultiplier: 1.0,
          advisoryBias: 4,
          cautionTtb: 50,
          warningTtb: 22,
          immediateTtb: 9
        };
      }

      function getZoneActiveClass(activeText) {
        if (!activeText) return "";
        if (activeText.includes("ACTIVE")) return "hud-status-active";
        if (activeText.includes("INACTIVE")) return "hud-status-inactive";
        return "";
      }

      function getZoneStatusClass(source) {
        if (!source) return "";
        if (source.includes("4D")) return "hud-status-warning";
        if (source.includes("PREDICT")) return "hud-status-caution";
        return "";
      }

      function getResultClass(breachText) {
        if (!breachText) return "";
        if (breachText.includes("BREACH")) return "hud-status-critical";
        if (breachText.includes("CONFLICT")) return "hud-status-warning";
        if (breachText.includes("CLEAR")) return "hud-status-ok";
        return "";
      }

      function computePilotRiskModel({
        zoneType,
        margin,
        ttb,
        boundaryPrediction,
        conflict4D,
        verticalRelation,
        envelopeCount = 0,
        vz
      }) {
        const sev = zoneSeverityProfile(zoneType);

        const effectiveTtb =
          conflict4D?.ttb_s ??
          boundaryPrediction?.ttb_s ??
          ttb ??
          null;

        const timeUrgency =
          effectiveTtb == null ? 0 :
          effectiveTtb <= 0 ? 1 :
          sigmoid(effectiveTtb, 40, 10);

        const nearTermUrgency =
          effectiveTtb == null ? 0 :
          effectiveTtb <= 0 ? 1 :
          sigmoid(effectiveTtb, 20, 5);

        let marginUrgency = 0;
        if (margin != null && Number.isFinite(margin)) {
          if (margin < 0) marginUrgency = 1;
          else marginUrgency = sigmoid(margin, 35, 10);
        }

        let geometryUrgency = 0;
        if (conflict4D?.conflict) geometryUrgency = 1;
        else if (boundaryPrediction) geometryUrgency = 0.58;

        let verticalUrgency = 0;
        if (verticalRelation === "INSIDE BAND") verticalUrgency = 1;
        else if (verticalRelation === "ABOVE CEILING") verticalUrgency = 0.75;
        else if (verticalRelation === "BELOW FLOOR") verticalUrgency = 0.35;

        const envelopeUrgency =
          envelopeCount > 0 ? Math.min(0.35, 0.12 * envelopeCount) : 0;

        const climbPenalty =
          vz != null && vz > 0 && verticalRelation === "INSIDE BAND"
            ? clamp01(vz / 3.5)
            : 0;

       // --- HARD TIME DOMINANCE ZONE ---
let timeDominance = 0;
if (effectiveTtb != null) {
  if (effectiveTtb <= 5) timeDominance = 1.0;
  else if (effectiveTtb <= 10) timeDominance = 0.85;
  else if (effectiveTtb <= 20) timeDominance = 0.65;
  else timeDominance = 0;
}

// --- BASE WEIGHTS ---
let weighted =
  timeUrgency * (0.25 + 0.35 * timeDominance) +   // up to 0.60
  nearTermUrgency * 0.15 +
  marginUrgency * (0.20 * (1 - timeDominance)) +  // margin suppressed when urgent
  geometryUrgency * 0.18 +
  verticalUrgency * 0.10 +
  envelopeUrgency * 0.05 +
  climbPenalty * 0.07;

weighted = clamp01(weighted);

// 🚨 HARD OVERRIDE — IMMINENT COLLISION
if (effectiveTtb != null && effectiveTtb <= 5) {
  return {
    score: 100,
    effectiveTtb,
    severity: sev,
    factors: {
      override: "IMMINENT_TTB"
    }
  };
}

// GRADUATED IMMINENCE OVERRIDE
if (effectiveTtb != null) {
  // 0–2 s: essentially unavoidable without immediate action
  if (effectiveTtb <= 2) {
    return {
      score: 100,
      effectiveTtb,
      severity: sev,
      factors: {
        timeUrgency,
        nearTermUrgency,
        marginUrgency,
        geometryUrgency,
        verticalUrgency,
        envelopeUrgency,
        climbPenalty,
        override: "TTB_LE_2"
      }
    };
  }

  // 2–5 s: critical, near-max urgency
  if (effectiveTtb <= 5) {
    return {
      score: 96,
      effectiveTtb,
      severity: sev,
      factors: {
        timeUrgency,
        nearTermUrgency,
        marginUrgency,
        geometryUrgency,
        verticalUrgency,
        envelopeUrgency,
        climbPenalty,
        override: "TTB_LE_5"
      }
    };
  }

  // 5–10 s: very high urgency, but not absolute max
  if (effectiveTtb <= 10) {
    const boostedScore = Math.max(
      88,
      Math.round(Math.min(100, (weighted * 100 + sev.advisoryBias) * sev.riskMultiplier))
    );

    return {
      score: boostedScore,
      effectiveTtb,
      severity: sev,
      factors: {
        timeUrgency,
        nearTermUrgency,
        marginUrgency,
        geometryUrgency,
        verticalUrgency,
        envelopeUrgency,
        climbPenalty,
        override: "TTB_LE_10"
      }
    };
  }

  // 10–20 s: strong warning floor
  if (effectiveTtb <= 20) {
    const boostedScore = Math.max(
      72,
      Math.round(Math.min(100, (weighted * 100 + sev.advisoryBias) * sev.riskMultiplier))
    );

    return {
      score: boostedScore,
      effectiveTtb,
      severity: sev,
      factors: {
        timeUrgency,
        nearTermUrgency,
        marginUrgency,
        geometryUrgency,
        verticalUrgency,
        envelopeUrgency,
        climbPenalty,
        override: "TTB_LE_20"
      }
    };
  }
}

        const riskScore = Math.round(
          Math.min(100, (weighted * 100 + sev.advisoryBias) * sev.riskMultiplier)
        );

        return {
          score: Math.min(100, riskScore),
          effectiveTtb,
          severity: sev,
          factors: {
            timeUrgency,
            nearTermUrgency,
            marginUrgency,
            geometryUrgency,
            verticalUrgency,
            envelopeUrgency,
            climbPenalty
          }
        };
      }

      function computeOperationalRisk({
        zoneType,
        margin,
        ttb,
        conflict4D,
        boundaryPrediction,
        verticalRelation,
        envelopeCount = 0,
        vz
      }) {
        return computePilotRiskModel({
          zoneType,
          margin,
          ttb,
          boundaryPrediction,
          conflict4D,
          verticalRelation,
          envelopeCount,
          vz
        }).score;
      }

      function choosePrimaryAction({
        conflict4D,
        boundaryPrediction,
        verticalRelation,
        vz,
        margin,
        ttb,
        turnBias
      }) {
        const turnText =
          turnBias?.turn === "LEFT" ? "TURN LEFT" :
          turnBias?.turn === "RIGHT" ? "TURN RIGHT" :
          "TURN";

        const urgentVertical =
          verticalRelation === "INSIDE BAND" &&
          vz != null &&
          vz > 0 &&
          ttb != null &&
          ttb <= 35;

        const veryLowMargin =
          margin != null &&
          margin <= 15 &&
          vz != null &&
          vz > 0;

        if (urgentVertical || veryLowMargin) {
          return { primary: "DESCEND", secondary: turnText };
        }

        if (conflict4D?.conflict || boundaryPrediction) {
          return { primary: turnText, secondary: "DESCEND" };
        }

        return { primary: turnText, secondary: "DESCEND" };
      }

      function computeAdvisoryPriority({
        level,
        ttb,
        zoneType,
        conflict4D,
        boundaryPrediction,
        verticalRelation,
        margin,
        vz
      }) {
        const sev = zoneSeverityProfile(zoneType);

        const levelBase =
          level === "IMMEDIATE" ? 100 :
          level === "WARNING" ? 72 :
          level === "CAUTION" ? 40 :
          10;

        let timeBoost = 0;
        if (ttb != null) {
          if (ttb <= sev.immediateTtb) timeBoost = 34;
          else if (ttb <= sev.warningTtb) timeBoost = 24;
          else if (ttb <= sev.cautionTtb) timeBoost = 10;
        }

        let geometryBoost = 0;
        if (conflict4D?.conflict) geometryBoost += 22;
        else if (boundaryPrediction) geometryBoost += 9;

        let verticalBoost = 0;
        if (verticalRelation === "INSIDE BAND") verticalBoost += 10;
        if (margin != null && margin < 0) verticalBoost += 18;
        else if (margin != null && margin <= 15) verticalBoost += 8;

        let trendBoost = 0;
        if (vz != null && vz > 0 && ttb != null && ttb <= 40) trendBoost += 6;

        return (levelBase + timeBoost + geometryBoost + verticalBoost + trendBoost + sev.advisoryBias) * sev.riskMultiplier;
      }

      function selectHighestPriorityAdvisory(candidates) {
        const valid = (candidates || []).filter(Boolean);

        if (!valid.length) {
          return {
            level: "INFO",
            text: "NO ACTION REQUIRED",
            cls: "risk-ok",
            actionChoice: null,
            priorityScore: 0
          };
        }

        return valid.reduce((best, candidate) =>
          (candidate.priorityScore || 0) > (best.priorityScore || 0) ? candidate : best
        );
      }

      function computeAdvisory({
        margin,
        vz,
        ttb,
        conflict4D,
        boundaryPrediction,
        verticalRelation,
        zoneName,
        zoneType,
        groundspeed,
        turnBias
      }) {
        const candidates = [];
        const sev = zoneSeverityProfile(zoneType);
        const effectiveTtb = conflict4D?.ttb_s ?? boundaryPrediction?.ttb_s ?? ttb ?? null;

        if (margin != null && margin < 0) {
          const actionChoice = choosePrimaryAction({
            conflict4D,
            boundaryPrediction,
            verticalRelation,
            vz,
            margin,
            ttb,
            turnBias
          });

          const advisory = {
            level: "IMMEDIATE",
            text:
              vz != null && vz > 0
                ? `DESCEND IMMEDIATELY — AIRSPACE BREACH (${zoneName || "ACTIVE ZONE"})`
                : `EXIT AIRSPACE IMMEDIATELY (${zoneName || "ACTIVE ZONE"})`,
            cls: "risk-breach",
            actionChoice
          };

          advisory.priorityScore = computeAdvisoryPriority({
            level: advisory.level,
            ttb: 0,
            zoneType,
            conflict4D,
            boundaryPrediction,
            verticalRelation,
            margin,
            vz
          });

          candidates.push(advisory);
        }

        if (conflict4D?.conflict) {
          const zoneLabel = conflict4D.zoneName || zoneName || "ZONE";
          const effectiveZoneType = conflict4D.zoneType || zoneType;

          const actionChoice = choosePrimaryAction({
            conflict4D,
            boundaryPrediction,
            verticalRelation,
            vz,
            margin,
            ttb,
            turnBias
          });

          let level = "CAUTION";
          if (effectiveTtb != null && effectiveTtb <= sev.warningTtb) level = "WARNING";
          if (effectiveTtb != null && effectiveTtb <= sev.immediateTtb) level = "IMMEDIATE";

          const advisory = {
            level,
            text:
              level === "IMMEDIATE"
                ? `${actionChoice.primary} NOW — CONFLICT WITH ${zoneLabel}`
                : level === "WARNING"
                ? `${actionChoice.primary} TO AVOID ${zoneLabel}`
                : `PLAN ${actionChoice.primary} — ${zoneLabel} AHEAD`,
            cls:
              level === "IMMEDIATE" ? "risk-breach" :
              level === "WARNING" ? "risk-warning" :
              "risk-caution",
            actionChoice
          };

          advisory.priorityScore = computeAdvisoryPriority({
            level: advisory.level,
            ttb: conflict4D.ttb_s ?? ttb,
            zoneType: effectiveZoneType,
            conflict4D,
            boundaryPrediction,
            verticalRelation,
            margin,
            vz
          });

          candidates.push(advisory);
        }

        if (boundaryPrediction && boundaryPrediction.ttb_s != null) {
          const zoneLabel = boundaryPrediction.zoneName || zoneName || "ZONE";
          const effectiveZoneType = boundaryPrediction.zoneType || zoneType;

          const actionChoice = choosePrimaryAction({
            conflict4D,
            boundaryPrediction,
            verticalRelation,
            vz,
            margin,
            ttb,
            turnBias
          });

          let level = null;
          if (boundaryPrediction.ttb_s <= sev.warningTtb) level = "WARNING";
          else if (boundaryPrediction.ttb_s <= sev.cautionTtb) level = "CAUTION";

          if (level) {
            const advisory = {
              level,
              text:
                level === "WARNING"
                  ? `${actionChoice.primary} — BOUNDARY AHEAD (${zoneLabel})`
                  : `PREPARE TO ${actionChoice.primary} (${zoneLabel})`,
              cls: level === "WARNING" ? "risk-warning" : "risk-caution",
              actionChoice
            };

            advisory.priorityScore = computeAdvisoryPriority({
              level: advisory.level,
              ttb: boundaryPrediction.ttb_s,
              zoneType: effectiveZoneType,
              conflict4D,
              boundaryPrediction,
              verticalRelation,
              margin,
              vz
            });

            candidates.push(advisory);
          }
        }

        if (ttb != null && verticalRelation === "INSIDE BAND") {
          let level = null;
          if (ttb <= 20) level = "WARNING";
          else if (ttb <= 45) level = "CAUTION";

          if (level) {
            const actionChoice = choosePrimaryAction({
              conflict4D,
              boundaryPrediction,
              verticalRelation,
              vz,
              margin,
              ttb,
              turnBias
            });

            const advisory = {
              level,
              text:
                level === "WARNING"
                  ? "DESCEND SOON — VERTICAL LIMIT APPROACHING"
                  : "MONITOR VERTICAL MARGIN",
              cls: level === "WARNING" ? "risk-warning" : "risk-caution",
              actionChoice
            };

            advisory.priorityScore = computeAdvisoryPriority({
              level: advisory.level,
              ttb,
              zoneType,
              conflict4D,
              boundaryPrediction,
              verticalRelation,
              margin,
              vz
            });

            candidates.push(advisory);
          }
        }

        if (margin != null && margin <= 20 && margin >= 0 && !candidates.length) {
          const actionChoice = choosePrimaryAction({
            conflict4D,
            boundaryPrediction,
            verticalRelation,
            vz,
            margin,
            ttb,
            turnBias
          });

          const advisory = {
            level: "CAUTION",
            text: "LOW VERTICAL MARGIN — HOLD PROFILE CAREFULLY",
            cls: "risk-caution",
            actionChoice
          };

          advisory.priorityScore = computeAdvisoryPriority({
            level: advisory.level,
            ttb,
            zoneType,
            conflict4D,
            boundaryPrediction,
            verticalRelation,
            margin,
            vz
          });

          candidates.push(advisory);
        }

        if (!candidates.length && groundspeed != null && groundspeed > 0) {
          candidates.push({
            level: "INFO",
            text: "TRACK STABLE — CONTINUE MONITORING",
            cls: "risk-ok",
            actionChoice: null,
            priorityScore: 1
          });
        }

        if (!candidates.length) {
          candidates.push({
            level: "INFO",
            text: "NO ACTION REQUIRED",
            cls: "risk-ok",
            actionChoice: null,
            priorityScore: 0
          });
        }

        return selectHighestPriorityAdvisory(candidates);
      }

      function advisoryLevelRank(level) {
        if (level === "IMMEDIATE") return 4;
        if (level === "WARNING") return 3;
        if (level === "CAUTION") return 2;
        return 1;
      }

      function advisoryKey(advisory) {
        if (!advisory) return "INFO|NO ACTION REQUIRED";
        return `${advisory.level || "INFO"}|${advisory.text || "NO ACTION REQUIRED"}`;
      }

      function getRiskBarClass(score) {
        if (score >= 82) return "risk-fill-critical";
        if (score >= 58) return "risk-fill-warning";
        if (score >= 28) return "risk-fill-caution";
        return "risk-fill-safe";
      }

      function smoothValue(previous, next, alpha = 0.2) {
        if (previous === null || previous === undefined || Number.isNaN(Number(previous))) {
          return Number(next) || 0;
        }
        if (next === null || next === undefined || Number.isNaN(Number(next))) {
          return Number(previous) || 0;
        }
        return previous + alpha * (next - previous);
      }

      function getRiskTrend(previousScore, currentScore, deadband = 2) {
        const prev = Number(previousScore) || 0;
        const curr = Number(currentScore) || 0;
        const delta = curr - prev;

        if (Math.abs(delta) < deadband) return { label: "STEADY", arrow: "→", delta };
        if (delta > 0) return { label: "RISING", arrow: "↑", delta };
        return { label: "FALLING", arrow: "↓", delta };
      }

      function getRiskReasonSummary({ margin, ttb, conflict4D, boundaryPrediction, envelopeCount = 0 }) {
        const reasons = [];

        if (margin !== null && margin !== undefined && !Number.isNaN(Number(margin))) {
          const m = Number(margin);
          if (m < 10) reasons.push("Very low margin");
          else if (m < 20) reasons.push("Low margin");
          else if (m < 50) reasons.push("Reduced margin");
        }

        if (ttb !== null && ttb !== undefined && !Number.isNaN(Number(ttb))) {
          const t = Number(ttb);
          if (t < 30) reasons.push("Immediate boundary risk");
          else if (t < 60) reasons.push("Near-term boundary risk");
          else if (t < 120) reasons.push("Emerging boundary risk");
        }

        if (conflict4D?.conflict) reasons.push("4D conflict predicted");
        else if (boundaryPrediction) reasons.push("Boundary prediction active");

        if (Number(envelopeCount) > 0) reasons.push(`Envelope conflicts: ${Number(envelopeCount)}`);

        return reasons.length ? reasons.join(" • ") : "Nominal conditions";
      }

      function logRiskTransition({ replayTime, previousRiskLabel, currentRiskLabel, riskScore, details, minGapMs = 2000 }) {
        const now = Date.now();

        if (!currentRiskLabel || previousRiskLabel === currentRiskLabel) return previousRiskLabel;
        if (lastRiskTransitionTs && now - lastRiskTransitionTs < minGapMs) return previousRiskLabel;

        console.log(
          `[RISK TRANSITION] t=${replayTime ?? "n/a"} ${previousRiskLabel || "NONE"} -> ${currentRiskLabel} | score=${riskScore} | ${details}`
        );

        lastRiskTransitionTs = now;
        return currentRiskLabel;
      }

      function computeAdvisoryConfidence({
        conflict4D,
        boundaryPrediction,
        turnBias,
        ttb,
        verticalRelation,
        zoneType
      }) {
        const sev = zoneSeverityProfile(zoneType);
        let score = 0;

        if (conflict4D?.conflict) score += 38;
        if (boundaryPrediction?.ttb_s != null && boundaryPrediction.ttb_s <= sev.warningTtb) score += 22;
        if (turnBias?.turn && turnBias.turn !== "NONE") score += 16;
        if (ttb != null && ttb <= 25) score += 12;
        if (verticalRelation === "INSIDE BAND") score += 8;

        if (score >= 65) return "HIGH";
        if (score >= 38) return "MEDIUM";
        return "LOW";
      }

      function stabilizeAdvisoryDisplay(newAdvisory, nowTs, { holdMs = 1500, candidateDwellMs = 700 } = {}) {
        const incoming = newAdvisory && newAdvisory.text
          ? newAdvisory
          : { level: "INFO", text: "NO ACTION REQUIRED", cls: "risk-ok", actionChoice: null, priorityScore: 0 };

        const current = lastStableAdvisory || {
          level: "INFO",
          text: "NO ACTION REQUIRED",
          cls: "risk-ok",
          actionChoice: null,
          priorityScore: 0
        };

        const incomingRank = advisoryLevelRank(incoming.level);
        const currentRank = advisoryLevelRank(current.level);

        const incomingKey = advisoryKey(incoming);
        const currentKey = advisoryKey(current);

        if (incomingKey === currentKey) {
          pendingAdvisory = null;
          pendingAdvisoryTs = 0;
          lastStableAdvisoryTs = nowTs;
          return current;
        }

        if (incomingRank > currentRank) {
          lastStableAdvisory = incoming;
          lastStableAdvisoryTs = nowTs;
          pendingAdvisory = null;
          pendingAdvisoryTs = 0;
          return lastStableAdvisory;
        }

        const withinHold = (nowTs - lastStableAdvisoryTs) < holdMs;
        if (withinHold) {
          return current;
        }

        const pendingKey = advisoryKey(pendingAdvisory);
        if (pendingKey !== incomingKey) {
          pendingAdvisory = incoming;
          pendingAdvisoryTs = nowTs;
          return current;
        }

        const pendingReady = (nowTs - pendingAdvisoryTs) >= candidateDwellMs;
        if (!pendingReady) {
          return current;
        }

        lastStableAdvisory = incoming;
        lastStableAdvisoryTs = nowTs;
        pendingAdvisory = null;
        pendingAdvisoryTs = 0;
        return lastStableAdvisory;
      }

      function computeGeojsonBounds(fc) {
        const b = new maplibregl.LngLatBounds();
        for (const f of (fc.features || [])) {
          const g = f.geometry;
          if (!g) continue;
          if (g.type === "Polygon") {
            for (const ring of g.coordinates) for (const coord of ring) b.extend(coord);
          } else if (g.type === "MultiPolygon") {
            for (const poly of g.coordinates) for (const ring of poly) for (const coord of ring) b.extend(coord);
          }
        }
        return b;
      }

      function zoomTo(map, bounds) {
        if (!bounds) return;
        map.fitBounds(bounds, { padding: 80, duration: 800 });
      }

      function unionBounds(a, b) {
        if (!a && !b) return null;
        if (a && !b) return a;

      function normalizeTs(value) {
        if (!value) return null;
        const d = new Date(value);
        return Number.isNaN(d.getTime()) ? null : d.toISOString();
      }

      function getComplianceForReplayTime(ts, fallbackIndex = 0) {
        if (!pointStatus?.length) return null;

        const safeFallback = pointStatus[Math.min(fallbackIndex, pointStatus.length - 1)] || null;
        const target = normalizeTs(ts);
        if (!target) return safeFallback;

        let exact = null;
        let best = null;
        let bestDiff = Infinity;

        for (const item of pointStatus) {
          const itemTs = normalizeTs(item.ts || item.timestamp || item.time);
          if (!itemTs) continue;

          if (itemTs === target) {
            exact = item;
            break;
          }

          const diff = Math.abs(new Date(itemTs).getTime() - new Date(target).getTime());
          if (!Number.isNaN(diff) && diff < bestDiff) {
            best = item;
            bestDiff = diff;
          }
        }

        return exact || best || safeFallback;

        const b = pts[currentIndex + 1] ?? a;
        const f = b.t === a.t ? 0 : (time - a.t) / (b.t - a.t);

        return {
          lng: a.lng + (b.lng - a.lng) * f,
          lat: a.lat + (b.lat - a.lat) * f,
          alt: a.alt + (b.alt - a.alt) * f,
          t: time,
          source_t: a.t
        };
      }

  }

  if (lastEventState.advisoryKey !== advisoryKey) {

      value: {

        },
        context,
        replayIso,
        simTimeMs
      });
    }
    lastEventState.ttbBands[key] = bands[key];
  }
}

          if (z) verticalTtb = predictVerticalConflictTtb(futurePath, z);
        }

        const ttb = predictTtb(margin, vz);

        const rawRiskScore = computeOperationalRisk({
          zoneType,
          margin,
          ttb,
          conflict4D,
          boundaryPrediction,
          verticalRelation,
          envelopeCount: predictiveEnvelopeConflicts.length || 0,
          vz
        });

      smoothedRiskScore = smoothValue(smoothedRiskScore, rawRiskScore, 0.25);

        const displayRiskScore = Math.round(smoothedRiskScore);
        const displayRiskInfo = computeRiskLevel(displayRiskScore);
        const riskTrend = getRiskTrend(lastDisplayedRiskScore, displayRiskScore, 2);
        const riskDelta = displayRiskScore - lastDisplayedRiskScore;
        lastDisplayedRiskScore = displayRiskScore;

        const riskSummary = getRiskReasonSummary({
          margin,
          ttb,
          conflict4D,
          boundaryPrediction,
          envelopeCount: predictiveEnvelopeConflicts.length || 0
        });

        lastRiskLabel = logRiskTransition({
          replayTime,
          previousRiskLabel: lastRiskLabel,
          currentRiskLabel: displayRiskInfo.label,
          riskScore: displayRiskScore,
          details: riskSummary
        });

        const hazardPos = conflict4D?.conflict ? conflict4D.pos : boundaryPrediction?.pos || null;
        const zoneBearing = hazardPos ? bearingDeg(pos, hazardPos) : null;
        const turnBias = computeTurnBias({ brg, zoneBearing });

        const advisory = computeAdvisory({
          margin,
          vz,
          ttb,
          conflict4D,
          boundaryPrediction,
          verticalRelation,
          zoneName,
          zoneType,
          groundspeed,
          turnBias
        });

        const stableAdvisory = stabilizeAdvisoryDisplay(
          advisory,
          replayTime || Date.now(),
          { holdMs: 1500, candidateDwellMs: 700 }
        );

  

        const actionText = stableAdvisory?.actionChoice
          ? [stableAdvisory.actionChoice.primary, stableAdvisory.actionChoice.secondary]
              .filter(Boolean)
              .join(" / ")
          : "—";

        const advisoryConfidence = computeAdvisoryConfidence({
          conflict4D,
          boundaryPrediction,
          turnBias,
          ttb,
          verticalRelation,
          zoneType
        });

        const advisoryPriorityText = stableAdvisory?.priorityScore != null
          ? stableAdvisory.priorityScore.toFixed(1)
          : "—";

        const boundaryTtb = boundaryPrediction?.ttb_s ?? null;
        const conflictTtb = conflict4D?.conflict ? conflict4D.ttb_s : null;
        const verticalConflictTtb = verticalTtb?.ttb_s ?? null;
        const envelopeConflictCount = predictiveEnvelopeConflicts.length;
        const envelopeActive = !!predictiveEnvelope;

        const focusZone =
  (conflict4D && {
    name: conflict4D.zoneName || "Unknown",
    type: conflict4D.zoneType || "-",
    ttb: conflict4D.ttb_s ?? null,
    boundaryTtb: boundaryPrediction?.ttb_s ?? null,
    conflictTtb: conflict4D.ttb_s ?? null,
    active: true,
    source: "4D CONFLICT"
  }) ||
  (boundaryPrediction && {
    name: boundaryPrediction.zoneName || "Unknown",
    type: boundaryPrediction.zoneType || "-",
    ttb: boundaryPrediction.ttb_s ?? null,
    boundaryTtb: boundaryPrediction.ttb_s ?? null,
    conflictTtb: null,
    active: true,
    source: "BOUNDARY PREDICTION"
  }) ||
  {
    name: zoneName,
    type: zoneType,
    ttb: null,
    boundaryTtb: null,
    conflictTtb: null,
    active: !!zone && zoneName !== "None",
    source: "COMPLIANCE"
  };

const focusZoneFeature = airspaceGeojson?.features?.find(
  f => f?.properties?.name === focusZone.name
);

const focusZoneLowerM = focusZoneFeature?.properties?.lower_m ?? lowerM;
const focusZoneUpperM = focusZoneFeature?.properties?.upper_m ?? upperM;

const focusZoneActiveText = focusZone.active ? "ACTIVE" : "INACTIVE";
const focusZoneVertBlock = `${fmtLimit(focusZoneLowerM)} → ${fmtLimit(focusZoneUpperM)}`;

                    logFlightEvents({
  replayIso: new Date(t).toISOString(),
  simTimeMs: simElapsed,
  riskLabel: displayRiskInfo.label,
  riskScore: displayRiskScore,
  advisory: stableAdvisory,
  ttb,
  boundaryPrediction,
  conflict4D,
  envelopeConflictCount,
  zoneName,
  zoneType,
  margin,
  verticalRelation
});

         aircraftEl.style.background =
          c?.breach_unknown ? "#ffbf00" :
          c?.breach ? "#ff0000" :
          c ? "#00ff00" : "#0057ff";

        const breachText =
          c?.breach ? "BREACH" :
          (conflict4D?.conflict || boundaryPrediction) ? "PREDICTED CONFLICT" :
          "CLEAR";

        const breachColor =
          c?.breach_unknown ? "#bbbbbb" :
          c?.breach ? "#ff0000" :
          "#00ff00";

        const marginPct =
          margin === null || margin === undefined || Number.isNaN(margin)
            ? 0
            : margin < 0 ? 100 : marginToPct(margin);

        let warnText = "";
        let warnClass = "";
        let warnShow = false;

        if (FEATURES.prediction && margin !== null && !Number.isNaN(margin)) {
          if (margin < 0) {
            warnShow = true;
            warnClass = "risk-breach";
            warnText = "BREACH — IMMEDIATE ACTION";
          } else if (ttb !== null && ttb <= 30) {
            warnShow = true;
            warnClass = "risk-warning";
            warnText = `PREDICTED BREACH IN ${Math.round(ttb)}s`;
          } else if (conflict4D?.conflict) {
            warnShow = true;
            warnClass = "risk-warning";
            warnText = `4D CONFLICT IN ${Math.round(conflict4D.ttb_s)}s (${conflict4D.zoneName})`;
          } else if (conflict4D && conflict4D.vertical_known === false) {
            warnShow = true;
            warnClass = "risk-caution";
            warnText = `BOUNDARY ENTRY IN ${Math.round(conflict4D.ttb_s)}s — VERTICAL UNKNOWN (${conflict4D.zoneName})`;
          } else if (boundaryPrediction) {
            warnShow = true;
            warnClass = "risk-caution";
            warnText = `TRACK ENTRY IN ${Math.round(boundaryPrediction.ttb_s)}s (${boundaryPrediction.zoneName})`;
          } else if (margin <= 20) {
            warnShow = true;
            warnClass = "risk-warning";
            warnText = "WARNING — LOW MARGIN";
          } else if (margin <= 50) {
            warnShow = true;
            warnClass = "risk-caution";
            warnText = "CAUTION — MARGIN REDUCING";
          }
        }

        if (stableAdvisory.level !== "INFO") {
          warnShow = true;
          warnClass = stableAdvisory.cls;
          warnText = stableAdvisory.text;
        }

        if (FEATURES.prediction && ttb !== null && ttb > 0 && ttb <= 120) {
          const tBreach = Math.min(t0 + duration, t + ttb * 1000);
          const breachPos = interpolate(tBreach);
          breachMarker.setLngLat([breachPos.lng, breachPos.lat]);
          breachEl.style.display = "block";
        } else {
          breachEl.style.display = "none";
        }

        if (FEATURES.prediction && (conflict4D?.conflict || boundaryPrediction)) {
          const p = conflict4D?.conflict ? conflict4D.pos : boundaryPrediction?.pos;
          if (!p) {
            entryEl.style.display = "none";
          } else {
            entryMarker.setLngLat([p.lng, p.lat]);
            entryEl.style.display = "block";

            if (conflict4D?.conflict) {
              entryEl.style.border = "3px solid #ff0000";
              entryEl.style.background = "rgba(255,0,0,0.18)";
            } else {
              entryEl.style.border = "3px solid #ffbf00";
              entryEl.style.background = "rgba(255,191,0,0.18)";
            }
          }
        } else {
          entryEl.style.display = "none";
        }

        if (map.getLayer("airspace-3d")) {
          map.setLayoutProperty("airspace-3d", "visibility", FEATURES.cone ? "visible" : "none");
        }

      hud.innerHTML = `
  <div class="hud-header">
    <div class="hud-title">MISSION CONTROL</div>
    <div class="hud-chip ${displayRiskInfo.cls}">${displayRiskInfo.label}</div>
  </div>

  <div class="hud-grid">
    <div class="hud-k">TIME</div><div class="hud-v">${new Date(t).toLocaleTimeString()}</div>
    <div class="hud-k">LAT</div><div class="hud-v">${pos.lat.toFixed(5)}</div>
    <div class="hud-k">LON</div><div class="hud-v">${pos.lng.toFixed(5)}</div>
    <div class="hud-k">ALT AMSL</div><div class="hud-v">${fmtM(altAmsl)}</div>
    <div class="hud-k">ALT AGL</div><div class="hud-v">${fmtM(altAgl)}</div>
    <div class="hud-k">TERRAIN</div><div class="hud-v">${fmtM(terrainAmsl)}</div>
    <div class="hud-k">V/S</div><div class="hud-v">${vz !== null ? `${vsArrow(vz)} ${vz.toFixed(1)} m/s` : "—"}</div>
    <div class="hud-k">HDG</div><div class="hud-v">${Number.isFinite(brg) ? `${brg.toFixed(0)}°` : "—"}</div>
    <div class="hud-k">GS</div><div class="hud-v">${groundspeed !== null ? `${groundspeed.toFixed(1)} m/s` : "—"}</div>
    <div class="hud-k">SPEED</div><div class="hud-v">${speed}×</div>
    <div class="hud-k">PROGRESS</div><div class="hud-v">${progress.toFixed(1)}%</div>
  </div>

  <div class="hud-divider"></div>

  <div class="hud-v hud-section-title">ZONE DETAILS</div>

  <div class="hud-grid">
    <div class="hud-k">ZONE NAME</div><div class="hud-v">${focusZone.name}</div>
    <div class="hud-k">ZONE TYPE</div><div class="hud-v">${focusZone.type}</div>
    <div class="hud-k">ZONE STATUS</div>
    <div class="hud-v ${getZoneStatusClass(focusZone.source)}">${focusZone.source}</div>
    <div class="hud-k">ZONE ACTIVE</div>
    <div class="hud-v ${getZoneActiveClass(focusZoneActiveText)}">${focusZoneActiveText}</div>
    <div class="hud-k">ZONE VERT BLOCK</div><div class="hud-v">${focusZoneVertBlock}</div>
    <div class="hud-k">ZONE SRC</div><div class="hud-v">${zoneSource}</div>
    <div class="hud-k">ZONE TTB</div><div class="hud-v">${focusZone.ttb !== null ? `${focusZone.ttb.toFixed(1)} s` : "—"}</div>
    <div class="hud-k">BND TTB</div><div class="hud-v">${boundaryTtb !== null ? `${boundaryTtb.toFixed(1)} s` : "—"}</div>
    <div class="hud-k">4D TTB</div><div class="hud-v">${conflictTtb !== null ? `${conflictTtb.toFixed(1)} s` : "—"}</div>
    <div class="hud-k">VERT TTB</div><div class="hud-v">${verticalConflictTtb !== null ? `${verticalConflictTtb.toFixed(1)} s` : "—"}</div>
    <div class="hud-k">ENVELOPE</div><div class="hud-v">${envelopeActive ? "ON" : "OFF"}</div>
    <div class="hud-k">ENV CONFLICTS</div><div class="hud-v">${envelopeConflictCount}</div>
  </div>

  <div class="hud-divider"></div>

  <div class="hud-v hud-section-title">UAV DETAILS</div>

  <div class="hud-grid">
    <div class="hud-k">UAV VERT LIMITS</div><div class="hud-v">${fmtLimit(lowerM)} → ${fmtLimit(upperM)}</div>
    <div class="hud-k">LIMIT BASIS</div><div class="hud-v">${basis}</div>
    <div class="hud-k">UAV STATUS</div><div class="hud-v">${status}</div>
    <div class="hud-k">CURRENT ALT</div><div class="hud-v">${fmtM(predictionAltNow)}</div>
    <div class="hud-k">VERT REL</div><div class="hud-v">${verticalRelation}</div>
    <div class="hud-k">MARGIN</div><div class="hud-v">${margin === null ? "—" : `${margin.toFixed(1)} m`}</div>
    <div class="hud-k">MARGIN %</div><div class="hud-v">${marginPct.toFixed(0)}%</div>
    <div class="hud-k">TTB</div><div class="hud-v">${ttb !== null ? `${ttb.toFixed(1)} s` : "—"}</div>
    <div class="hud-k">PRED HOR</div><div class="hud-v">${predictSeconds.toFixed(1)} s</div>
    <div class="hud-k">PRED DIST</div><div class="hud-v">${predictedDistanceM.toFixed(1)} m</div>
    <div class="hud-k">RESULT</div>
    <div class="hud-v ${getResultClass(breachText)}">${breachText}</div>
  </div>

  <div class="hud-divider"></div>

  <div class="hud-grid">
    <div class="hud-k">RISK</div><div class="hud-v ${displayRiskInfo.cls}">${displayRiskInfo.label}</div>
    <div class="hud-k">SCORE</div><div class="hud-v">${displayRiskScore}%</div>
    <div class="hud-k">TREND</div><div class="hud-v">${riskTrend.arrow} ${riskTrend.label}</div>
    <div class="hud-k">ΔRISK</div><div class="hud-v">${riskDelta > 0 ? "+" : ""}${riskDelta}</div>
    <div class="hud-k">DRIVERS</div><div class="hud-v">${riskSummary}</div>
  </div>

  <div class="risk-bar-wrap" title="${riskSummary}">
    <div class="risk-bar-fill ${getRiskBarClass(displayRiskScore)}" style="width:${displayRiskScore}%"></div>
  </div>

  <div class="hud-divider"></div>

  <div class="hud-grid">
    <div class="hud-k">ADV PRI</div><div class="hud-v">${advisoryPriorityText}</div>
    <div class="hud-k">ADVISORY</div><div class="hud-v ${stableAdvisory.cls}">${stableAdvisory.level}</div>
    <div class="hud-k">ACTION</div><div class="hud-v ${stableAdvisory.cls}">${stableAdvisory.text}</div>
    <div class="hud-k">CONFIDENCE</div><div class="hud-v">${advisoryConfidence}</div>
    <div class="hud-k">MANEUVER</div><div class="hud-v">${actionText}</div>
  </div>

  <div class="warnstrip ${warnShow ? "show" : ""} ${warnClass}">
    ${warnText}
  </div>
`;

        window._fsmsDebug = {
  simElapsed,
  t,
  playing,
  currentIndex,
  risk: displayRiskInfo?.label ?? null,
  advisory: stableAdvisory?.text ?? null
};

if (
  playing &&
  (!window._lastDebugEventMs || simElapsed - window._lastDebugEventMs >= 3000)
) {
  pushFlightEvent({
    event_type: "debug_tick",
    source: "debug",
    severity: "INFO",
    value: { sim_time_ms: Math.round(simElapsed) },
    context: {},
    replayIso: new Date(t).toISOString(),
    simTimeMs: simElapsed
  });
  window._lastDebugEventMs = simElapsed;
}

        if (slider) slider.value = duration > 0 ? simElapsed / duration : 0;
        requestAnimationFrame(loop);
      }

      zoomFlightBtn.onclick = () => zoomTo(map, flightBounds);
      zoomAirspaceBtn.onclick = () => zoomTo(map, airspaceBounds);
      zoomBothBtn.onclick = () => zoomTo(map, unionBounds(flightBounds, airspaceBounds));

      playBtn.onclick = () => {
        playing = !playing;
        playBtn.textContent = playing ? "Pause" : "Play";
        if (playing) lastFrame = null;
      };

      slider.oninput = (e) => {
        simElapsed = Number(e.target.value) * duration;
        currentIndex = 0;
        lastSmoothedPos = null;
        lastPrediction = null;
      };

      speedSel.onchange = () => {
        speed = Number(speedSel.value) || 1;
      };

      const featureToggleBtn = document.getElementById("feature-toggle");
      if (featureToggleBtn) {
        featureToggleBtn.onclick = () => {
          const panel = document.getElementById("feature-panel");
          if (panel) panel.style.display = panel.style.display === "block" ? "none" : "block";
        };
      }
    })();
  </script>
