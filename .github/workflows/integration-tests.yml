name: Integration Tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fsms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d fsms_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Run migrations
        run: npm run migrate:test
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/fsms_test
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: fsms_test

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/fsms_test
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: fsms_test

      - name: Enforce nextBuildStep quality on PR
        if: github.event_name == 'pull_request'
        run: node scripts/check-next-build-step-pr.mjs origin/${{ github.base_ref }}

      - name: Generate nextBuildStep suggestion
        if: github.event_name == 'pull_request'
        run: node scripts/suggest-next-build-step.mjs origin/${{ github.base_ref }} nextstep-comment.md

      - name: Comment suggested nextBuildStep on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('nextstep-comment.md', 'utf8');

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const marker = '<!-- fsms-nextbuildstep-comment -->';
            const finalBody = `${marker}\n${body}`;

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
            });

            const existing = comments.data.find(c =>
              c.user?.type === 'Bot' && c.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: finalBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: finalBody,
              });
            }