name: Validate FSMS Save Point

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run validate:savepoint
      - run: bash scripts/check-savepoint-required.sh origin/main
      - run: node scripts/check-savepoint-semantic.mjs origin/main